<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Ami Please Restaurant</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins;
}

/* LOGIN PAGE */

#loginPage{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:url("https://images.unsplash.com/photo-1504674900247-0877df9cc836") center/cover;
}

.loginBox{
background:rgba(255,255,255,0.95);
padding:40px;
border-radius:12px;
width:300px;
text-align:center;
}

.loginBox h2{
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin:8px 0;
}

button{
width:100%;
padding:10px;
background:#ff4d4d;
border:none;
color:white;
cursor:pointer;
}

a{
cursor:pointer;
display:block;
margin-top:8px;
font-size:14px;
color:#ff4d4d;
}

/* MENU PAGE */

#menu{
display:none;
background:#f6f6f6;
min-height:100vh;
}

/* TOP BANNER */

.banner{
background:url("https://images.unsplash.com/photo-1555396273-367ea4eb4db5") center/cover;
height:200px;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-size:32px;
font-weight:600;
}

/* FOOD */

.food{
background:white;
margin:10px;
padding:15px;
border-radius:10px;
}

.add{
background:black;
color:white;
padding:5px 12px;
margin-top:6px;
}

#cart{
position:fixed;
bottom:20px;
right:20px;
background:black;
color:white;
padding:12px 18px;
border-radius:30px;
cursor:pointer;
}

#adminPanel{
display:none;
background:#222;
color:white;
padding:10px;
}

</style>

</head>

<body>

<!-- LOGIN PAGE -->

<div id="loginPage">

<div class="loginBox">

<h2>Ami Please</h2>

<input id="email" placeholder="Email">

<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<button onclick="signup()">Signup</button>

<a onclick="forgot()">Forgot Password?</a>

</div>

</div>


<!-- MENU PAGE -->

<div id="menu">

<div class="banner">

Ami Please Restaurant

</div>

<div id="adminPanel">

Admin Panel  
<input type="file">

</div>

<div id="foodList"></div>

<div id="cart">Cart</div>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword,
createUserWithEmailAndPassword,
sendPasswordResetEmail,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";


const firebaseConfig = {

apiKey:"AIzaSyA1bN6g1EW62p-sDhZh6XsRe78fsJWSe9I",
authDomain:"ami-please-restaurant.firebaseapp.com",
projectId:"ami-please-restaurant",
storageBucket:"ami-please-restaurant.firebasestorage.app",
messagingSenderId:"590274660115",
appId:"1:590274660115:web:998a7c8bb31e4a2696fce6"

};


const app = initializeApp(firebaseConfig);

const auth = getAuth(app);


const adminEmail="beejumble43@gmail.com";


window.login=function(){

signInWithEmailAndPassword(auth,email.value,password.value)
.catch(e=>alert(e.message))

}


window.signup=function(){

createUserWithEmailAndPassword(auth,email.value,password.value)
.catch(e=>alert(e.message))

}


window.forgot=function(){

sendPasswordResetEmail(auth,email.value)
.then(()=>alert("Reset email sent"))

}


onAuthStateChanged(auth,(user)=>{

if(user){

loginPage.style.display="none"

menu.style.display="block"

if(user.email===adminEmail){

adminPanel.style.display="block"

}

}

})


const foods=[

{name:"Steamed Momos",price:110},

{name:"Fried Momos",price:110},

{name:"Schezwan Momos",price:150},

{name:"Crispy Momos",price:140},

{name:"Chicken Biryani",price:160},

{name:"Mutton Biryani",price:220},

{name:"Chicken 65",price:150},

{name:"French Fries",price:90},

{name:"Tea",price:25},

{name:"Coffee",price:40}

]


foods.forEach(f=>{

foodList.innerHTML+=`

<div class="food">

<h3>${f.name}</h3>

<p>₹${f.price}</p>

<button class="add">Add</button>

</div>

`

})

</script>

</body>

</html>
