<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ami Please Cafe & Restaurant</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins;
background:#0f0f1a;
color:white;
}

header{
position:fixed;
top:0;
width:100%;
background:#111;
padding:15px;
display:flex;
justify-content:space-between;
z-index:1000;
}

.logo{
font-size:20px;
font-weight:600;
}

.cart-btn{
background:#ff3d3d;
padding:8px 14px;
border-radius:20px;
cursor:pointer;
}

.hero{
margin-top:60px;
height:240px;
background:url("https://images.unsplash.com/photo-1517248135467-4c7edcad34c4") center/cover;
display:flex;
align-items:center;
justify-content:center;
}

.hero h1{
background:rgba(0,0,0,0.6);
padding:10px 20px;
border-radius:10px;
}

.menu{
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
}

.food{
background:#1b1b2f;
border-radius:10px;
overflow:hidden;
}

.food img{
width:100%;
height:150px;
object-fit:cover;
}

.food-info{
padding:10px;
}

.price{
color:#ffd700;
}

.rating{
color:#ffd700;
font-size:13px;
}

button{
margin-top:6px;
padding:6px 10px;
border:none;
background:#ff3d3d;
color:white;
border-radius:6px;
cursor:pointer;
}

.upload{
background:#333;
width:100%;
}

.cart{
position:fixed;
right:-350px;
top:0;
width:320px;
height:100%;
background:#111;
padding:20px;
transition:0.4s;
overflow:auto;
}

.cart.active{
right:0;
}

.cart-item{
display:flex;
justify-content:space-between;
margin-bottom:8px;
}

.total{
margin-top:15px;
font-weight:bold;
}

.form{
display:none;
margin-top:15px;
}

input{
width:100%;
padding:8px;
margin-top:6px;
border:none;
border-radius:6px;
}

</style>
</head>

<body>

<header>
<div class="logo">Ami Please</div>
<div class="cart-btn" onclick="toggleCart()">Cart (<span id="count">0</span>)</div>
</header>

<div class="hero">
<h1>Ami Please Cafe & Restaurant</h1>
</div>

<div class="menu" id="menu"></div>

<div class="cart" id="cartBox">

<h3>Your Cart</h3>

<div id="cartItems"></div>

<div class="total">
Total ₹ <span id="total">0</span>
</div>

<button onclick="showForm()" style="width:100%">Done</button>

<div class="form" id="orderForm">

<input id="phone" placeholder="Phone Number">

<input id="house" placeholder="House Number">

<input id="area" placeholder="Area">

<input id="city" placeholder="City">

<input id="pincode" placeholder="Pincode">

<button onclick="getLocation()">Use My Location</button>

<button onclick="sendOrder()" style="background:green;width:100%">Place Order</button>

</div>

</div>

<script>

const foods=[

{name:"Steamed Momos",price:120},
{name:"Fried Momos",price:130},
{name:"Afghani Momos",price:150},
{name:"Tandoori Momos",price:140},
{name:"Chilli Momos",price:150},
{name:"Altabaq Special Platter",price:180},

{name:"Chicken Biryani",price:250},
{name:"Classic Chicken Fried Rice",price:250},
{name:"Classic Veg Fried Rice",price:200},
{name:"Schezwan Chicken Fried Rice",price:280},
{name:"Schezwan Veg Fried Rice",price:250},
{name:"Zeera Rice",price:120},
{name:"Plain Rice",price:100},

{name:"Roomali Roti",price:25},
{name:"Roomali Butter Roti",price:40},
{name:"Plain Naan",price:40},
{name:"Butter Naan",price:60},

{name:"Chicken Shawarma Roll",price:170},
{name:"Chicken Roll",price:150},
{name:"Kathi Roll",price:170},
{name:"Afghani Chicken Roll",price:250},
{name:"Veg Roll",price:100},

{name:"Margherita Pizza",price:200},
{name:"Farmhouse Pizza",price:250},
{name:"Chicken Pizza",price:280},
{name:"Cheese Pizza",price:220},
{name:"Tandoori Chicken Pizza",price:300},

{name:"Veg Burger",price:120},
{name:"Chicken Burger",price:150},
{name:"Cheese Burger",price:170},

{name:"French Fries",price:100},
{name:"Cheese Fries",price:120},

{name:"Chicken Nuggets",price:180},
{name:"Chicken Wings",price:220},

{name:"Paneer Tikka",price:250},
{name:"Chicken Tikka",price:300},

{name:"Paneer Butter Masala",price:260},
{name:"Chicken Butter Masala",price:320},

{name:"Cold Coffee",price:120},
{name:"Cappuccino",price:140},
{name:"Latte",price:150},

{name:"Chocolate Shake",price:150},
{name:"Oreo Shake",price:160},

{name:"Vanilla Ice Cream",price:90},
{name:"Chocolate Ice Cream",price:100},
{name:"Strawberry Ice Cream",price:100},

{name:"Brownie",price:150},
{name:"Chocolate Cake",price:200}

]

const menu=document.getElementById("menu")

foods.forEach((f,i)=>{

menu.innerHTML+=`

<div class="food">

<img id="img${i}" src="https://picsum.photos/300?random=${i}">

<div class="food-info">

<div>${f.name}</div>

<div class="rating">⭐4.5</div>

<div class="price">₹${f.price}</div>

<button onclick="addCart('${f.name}',${f.price})">Add</button>

<input type="file" accept="image/*" onchange="loadImg(event,'img${i}')" class="upload">

</div>

</div>

`

})

let cart=[]

function addCart(name,price){

cart.push({name,price})

updateCart()

}

function updateCart(){

let html=""
let total=0

cart.forEach(c=>{

html+=`<div class="cart-item">
<span>${c.name}</span>
<span>₹${c.price}</span>
</div>`

total+=c.price

})

document.getElementById("cartItems").innerHTML=html
document.getElementById("total").innerText=total
document.getElementById("count").innerText=cart.length

}

function toggleCart(){
document.getElementById("cartBox").classList.toggle("active")
}

function loadImg(e,id){
document.getElementById(id).src=URL.createObjectURL(e.target.files[0])
}

function showForm(){
document.getElementById("orderForm").style.display="block"
}

function getLocation(){

navigator.geolocation.getCurrentPosition(pos=>{

window.userLocation=
pos.coords.latitude+","+pos.coords.longitude

alert("Location captured")

})

}

function sendOrder(){

let phone=document.getElementById("phone").value
let house=document.getElementById("house").value
let area=document.getElementById("area").value
let city=document.getElementById("city").value
let pin=document.getElementById("pincode").value

let order="Order:%0A"

cart.forEach(c=>{
order+=c.name+" ₹"+c.price+"%0A"
})

order+="%0APhone:"+phone
order+="%0AAddress:"+house+","+area+","+city+","+pin

if(window.userLocation){
order+="%0ALocation:https://maps.google.com/?q="+window.userLocation
}

window.location.href="sms:8899242083?body="+order

}

</script>

</body>
</html>
