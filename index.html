<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ami Please Restaurant</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins;
margin:0;
background:linear-gradient(135deg,#ff512f,#dd2476);
color:white;
}

.login{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.box{
background:white;
color:black;
padding:35px;
border-radius:12px;
width:300px;
text-align:center;
}

input{
width:100%;
padding:10px;
margin:8px 0;
}

button{
padding:10px;
width:100%;
background:#ff512f;
border:none;
color:white;
cursor:pointer;
}

#menu{
display:none;
padding:20px;
}

.food{
background:white;
color:black;
margin:10px;
padding:10px;
border-radius:10px;
}

#adminPanel{
display:none;
background:black;
padding:10px;
margin:10px;
}

#cartBtn{
position:fixed;
bottom:20px;
right:20px;
background:black;
padding:10px 20px;
border-radius:30px;
}

</style>

</head>

<body>

<div class="login" id="loginPage">

<div class="box">

<h2>Ami Please</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<button onclick="signup()">Signup</button>

</div>

</div>


<div id="menu">

<h2>Ami Please Restaurant Menu</h2>

<div id="adminPanel">

<h3>Admin Panel</h3>

<input type="file" id="imageUpload">

</div>

<div id="foods"></div>

<div id="cartBtn" onclick="openCart()">Cart</div>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword,
createUserWithEmailAndPassword,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";


const firebaseConfig = {

apiKey: "YOUR_API_KEY",
authDomain: "YOUR_DOMAIN",
projectId: "YOUR_PROJECT_ID",
storageBucket: "YOUR_BUCKET",
messagingSenderId: "YOUR_ID",
appId: "YOUR_APP_ID"

};


const app = initializeApp(firebaseConfig);

const auth = getAuth(app);


const adminEmail = "beejumble43@gmail.com";


window.login = function(){

signInWithEmailAndPassword(auth,email.value,password.value)
.catch(e=>alert(e.message))

}


window.signup = function(){

createUserWithEmailAndPassword(auth,email.value,password.value)
.catch(e=>alert(e.message))

}


onAuthStateChanged(auth,(user)=>{

if(user){

loginPage.style.display="none"

menu.style.display="block"

if(user.email===adminEmail){

adminPanel.style.display="block"

}

}

})


const foods=[

{name:"Steamed Momos",price:110},

{name:"Fried Momos",price:110},

{name:"Schezwan Momos",price:150},

{name:"Crispy Momos",price:140},

{name:"Chicken Biryani",price:160},

{name:"Mutton Biryani",price:220},

{name:"Chicken 65",price:150},

{name:"French Fries",price:90},

{name:"Tea",price:25},

{name:"Coffee",price:40}

]


foods.forEach(f=>{

foodsDiv.innerHTML+=`

<div class="food">

<h3>${f.name}</h3>

<p>₹${f.price}</p>

<button>Add to Cart</button>

</div>

`

})

</script>

</body>

</html>
