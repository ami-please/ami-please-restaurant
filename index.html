<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ami Please Restaurant</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
    --primary:#c0392b;  /* Accent Red */
    --secondary:#2c3e50; /* Dark Blue-Gray */
    --bg:#ecf0f1; /* Light Gray */
    --card:#ffffff;
    --radius:12px;
    --transition:0.3s;
}

body {
    font-family:'Poppins',sans-serif;
    margin:0;
    padding:0;
    background:var(--bg);
}

button { cursor:pointer; border:none; transition:var(--transition); }

/* Login Page */
#loginPage {
    position:fixed;
    top:0; left:0; width:100%; height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#bdc3c7;
    z-index:1000;
}

.loginBox {
    background:white;
    padding:40px;
    border-radius:var(--radius);
    width:90%; max-width:400px;
    text-align:center;
    box-shadow:0 8px 20px rgba(0,0,0,0.3);
}

.loginBox h2 {
    font-family:'Playfair Display',serif;
    color:var(--primary);
    margin-bottom:20px;
}

.input-group {
    margin-bottom:15px;
    text-align:left;
}

.input-group input {
    width:100%;
    padding:12px;
    border-radius:var(--radius);
    border:1px solid #ddd;
    outline:none;
}

/* Main Menu */
header {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 20px;
    background:var(--secondary);
    color:white;
    position:sticky;
    top:0;
    z-index:10;
    box-shadow:0 2px 8px rgba(0,0,0,0.2);
}

.logo {
    font-family:'Playfair Display',serif;
    font-size:22px;
    color:white;
}

.cart-icon {
    position:relative;
    font-size:24px;
    cursor:pointer;
}

.cart-badge {
    position:absolute;
    top:-8px; right:-8px;
    background:var(--primary);
    color:white;
    font-size:12px;
    width:20px; height:20px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* Admin Controls */
#adminControls {
    display:flex;
    justify-content:flex-end;
    gap:10px;
    padding:10px 20px;
}

/* Horizontal Foods */
.container {
    display:flex;
    overflow-x:auto;
    gap:15px;
    padding:15px;
}

.food-card {
    background:var(--card);
    padding:15px;
    border-radius:var(--radius);
    min-width:200px;
    flex-shrink:0;
    box-shadow:0 4px 15px rgba(0,0,0,0.08);
    display:flex;
    flex-direction:column;
    align-items:center;
    transition:transform 0.2s;
}

.food-card:hover { transform:translateY(-5px); }

.food-card h3 {
    margin:5px 0;
    font-size:18px;
    text-align:center;
}

.food-actions {
    display:flex;
    justify-content:space-between;
    width:100%;
    margin-top:10px;
}

.add-btn, .minus-btn {
    background:var(--primary);
    color:white;
    border-radius:50%;
    width:30px; height:30px;
}

.add-btn:hover, .minus-btn:hover { transform:scale(1.1); }

/* Modals */
#adminPanel,#cartModal,#orderFormOverlay {
    display:none;
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.5);
    justify-content:center;
    align-items:center;
    z-index:1000;
}

.admin-form,.cart-panel,.order-form {
    background:white;
    padding:20px;
    border-radius:var(--radius);
    width:90%; max-width:400px;
    display:flex; flex-direction:column; gap:10px;
}

.cart-items { max-height:300px; overflow-y:auto; }
.cart-item { display:flex; justify-content:space-between; padding:5px 0; }

/* Thanks Popup */
#thanksPopup {
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    background:var(--primary);
    color:white;
    padding:15px 25px;
    border-radius:var(--radius);
    display:none;
    z-index:1000;
    font-weight:600;
}
#thanksPopup.show {
    display:block;
    animation:fadeInOut 2s forwards;
}
@keyframes fadeInOut {
    0%{opacity:0;}
    10%,90%{opacity:1;}
    100%{opacity:0;}
}
</style>
</head>
<body>

<!-- LOGIN PAGE -->
<div id="loginPage">
    <div class="loginBox">
        <h2>Ami Please</h2>
        <div class="input-group"><label>Email</label><input id="email" type="email" placeholder="Enter your email"></div>
        <div class="input-group"><label>Password</label><input id="password" type="password" placeholder="Enter your password"></div>
        <button onclick="login()">Login</button>
        <button onclick="signup()">Signup</button>
        <div style="margin-top:10px;"><a onclick="forgot()" style="color:var(--primary);cursor:pointer;">Forgot Password?</a></div>
    </div>
</div>

<!-- MAIN MENU -->
<div id="menu" style="display:none;">
    <header>
        <div class="logo"><i class="fas fa-utensils"></i> Ami Please</div>
        <div>
            <span class="cart-icon" onclick="toggleCart()">
                <i class="fas fa-shopping-cart"></i>
                <span id="cartCount" class="cart-badge">0</span>
            </span>
            <button onclick="logout()" style="margin-left:10px;">Logout</button>
        </div>
    </header>

    <!-- Admin Add Food Button -->
    <div id="adminControls" style="display:none;">
        <button onclick="openAdminPanel()" style="background:var(--primary); color:white; padding:8px 15px; border-radius:var(--radius);">Add Food</button>
    </div>

    <div class="container" id="foodList"></div>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel">
    <div class="admin-form">
        <h3 id="adminFormTitle">Upload Food</h3>
        <input type="text" id="foodName" placeholder="Food Name">
        <input type="number" id="foodPrice" placeholder="Price">
        <input type="number" id="foodRating" placeholder="Rating (1-5)">
        <button onclick="submitFood()" style="background:var(--primary); color:white;">Submit</button>
        <button onclick="closeAdminPanel()" style="background:#ccc;color:#000;">Cancel</button>
    </div>
</div>

<!-- CART MODAL -->
<div id="cartModal">
    <div class="cart-panel">
        <div class="cart-header">
            <h3>Your Cart</h3>
            <span class="close-cart" onclick="toggleCart()">&times;</span>
        </div>
        <div id="cartItems" class="cart-items"></div>
        <div class="cart-footer">
            <div class="total-row"><span>Total:</span><span id="cartTotal">₹0</span></div>
            <button onclick="showOrderForm()" style="background:var(--primary); color:white;">Done</button>
        </div>
    </div>
</div>

<!-- ORDER FORM -->
<div id="orderFormOverlay">
    <div class="order-form">
        <input id="phone" placeholder="Phone number">
        <input id="pincode" placeholder="Pincode">
        <input id="area" placeholder="Area">
        <input id="city" placeholder="City">
        <button onclick="placeOrder()" style="background:var(--primary); color:white;">Place Order</button>
    </div>
</div>

<!-- THANKS POPUP -->
<div id="thanksPopup">Thanks for visiting Ami Please!</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA1bN6g1EW62p-sDhZh6XsRe78fsJWSe9I",
  authDomain: "ami-please-restaurant.firebaseapp.com",
  projectId: "ami-please-restaurant",
  storageBucket: "ami-please-restaurant.appspot.com",
  messagingSenderId: "590274660115",
  appId: "1:590274660115:web:998a7c8bb31e4a2696fce6"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const adminEmail = "beejumble43@gmail.com";
let cart = [], foods = [], editingFoodId = null;

// AUTH
window.login = ()=>{ const e=document.getElementById('email').value; const p=document.getElementById('password').value;
if(!e||!p) return alert("Fill all fields"); signInWithEmailAndPassword(auth,e,p).catch(e=>alert(e.message)); }
window.signup = ()=>{ const e=document.getElementById('email').value; const p=document.getElementById('password').value;
if(!e||!p) return alert("Fill all fields"); createUserWithEmailAndPassword(auth,e,p).catch(e=>alert(e.message)); }
window.forgot = ()=>{ const e=prompt("Enter your email"); if(e) sendPasswordResetEmail(auth,e).then(()=>alert("Reset email sent")).catch(e=>alert(e.message)); }
window.logout = ()=>{ signOut(auth).catch(e=>alert(e.message)); }

onAuthStateChanged(auth,user=>{
    if(user){
        document.getElementById('loginPage').style.display="none";
        document.getElementById('menu').style.display="block";
        if(user.email===adminEmail) document.getElementById('adminControls').style.display="flex";
        loadFoods();
    } else{
        document.getElementById('loginPage').style.display="flex";
        document.getElementById('menu').style.display="none";
        document.getElementById('adminControls').style.display="none";
    }
});

// LOAD FOODS
async function loadFoods(){ foods=[]; const snap=await getDocs(collection(db,"foods"));
snap.forEach(d=>{ const data=d.data(); if(!data.deleted) foods.push({id:d.id,...data}); });
renderFoods();}

// RENDER FOODS
function renderFoods(){ const container=document.getElementById('foodList'); container.innerHTML="";
foods.forEach(f=>{ const div=document.createElement('div'); div.className="food-card";
div.innerHTML=`<h3>${f.name}</h3><p>₹${f.price} - ⭐${f.rating}</p>
<div class="food-actions">
<button onclick="updateCart('${f.id}',-1)">-</button>
<span id="qty-${f.id}">0</span>
<button onclick="updateCart('${f.id}',1)">+</button>
</div>
${auth.currentUser?.email===adminEmail?`<div style="margin-top:8px;">
<button onclick="editFood('${f.id}')">Edit</button>
<button onclick="deleteFood('${f.id}')">Delete</button>
</div>`:""}`; container.appendChild(div); });}

// CART
function updateCart(id,change){ let item=cart.find(i=>i.id===id); if(item){ item.qty+=change;if(item.qty<0)item.qty=0; }
else if(change>0) cart.push({id,qty:change}); document.getElementById(`qty-${id}`).innerText=(cart.find(i=>i.id===id)||{qty:0}).qty; updateCartUI();}
function updateCartUI(){ const ci=document.getElementById('cartItems'); ci.innerHTML=""; let total=0;
cart.forEach(c=>{ const f=foods.find(ff=>ff.id===c.id); if(f){ total+=f.price*c.qty; const div=document.createElement('div'); div.className="cart-item";
div.innerHTML=`<span>${f.name} x ${c.qty}</span><span>₹${f.price*c.qty}</span>`; ci.appendChild(div); } });
document.getElementById('cartTotal').innerText=`₹${total}`; document.getElementById('cartCount').innerText=cart.reduce((a,b)=>a+b.qty,0); }

window.toggleCart=()=>{ const cm=document.getElementById('cartModal'); cm.style.display=(cm.style.display==="flex")?"none":"flex"; }
window.showOrderForm=()=>{ if(cart.length===0){ alert("Cart is empty"); return; } document.getElementById('orderFormOverlay').style.display="flex"; }
window.placeOrder=async()=>{ const p=document.getElementById('phone').value; const pin=document.getElementById('pincode').value;
const a=document.getElementById('area').value; const c=document.getElementById('city').value;
if(!p||!pin||!a||!c){ alert("Fill all fields"); return; } await addDoc(collection(db,"orders"),{user:auth.currentUser.email, cart, phone:p, pin, area:a, city:c, timestamp:Date.now()});
document.getElementById('orderFormOverlay').style.display="none"; cart=[]; updateCartUI();
document.getElementById('phone').value=""; document.getElementById('pincode').value="";
document.getElementById('area').value=""; document.getElementById('city').value="";
const popup=document.getElementById('thanksPopup'); popup.classList.add('show'); setTimeout(()=>popup.classList.remove('show'),2000); }

// ADMIN PANEL
window.openAdminPanel = ()=>{ editingFoodId=null; document.getElementById('adminFormTitle').innerText="Upload Food";
document.getElementById('foodName').value=""; document.getElementById('foodPrice').value=""; document.getElementById('foodRating').value="";
document.getElementById('adminPanel').style.display="flex"; }
window.closeAdminPanel=()=>{ document.getElementById('adminPanel').style.display="none"; }

window.submitFood = async ()=>{ const name=document.getElementById('foodName').value; const price=Number(document.getElementById('foodPrice').value);
const rating=Number(document.getElementById('foodRating').value); if(!name||!price||!rating){ alert("Fill all fields"); return; }
if(editingFoodId){ const foodRef=doc(db,"foods",editingFoodId); await updateDoc(foodRef,{name, price, rating}); editingFoodId=null; }
else await addDoc(collection(db,"foods"),{name, price, rating}); document.getElementById('adminPanel').style.display="none"; loadFoods(); }

window.editFood=id=>{ const f=foods.find(ff=>ff.id===id); if(!f) return; editingFoodId=id;
document.getElementById('adminFormTitle').innerText="Edit Food"; document.getElementById('foodName').value=f.name;
document.getElementById('foodPrice').value=f.price; document.getElementById('foodRating').value=f.rating;
document.getElementById('adminPanel').style.display="flex"; }
window.deleteFood=async id=>{ if(!confirm("Are you sure you want to delete this food?")) return; const foodRef=doc(db,"foods",id);
await updateDoc(foodRef,{deleted:true}); loadFoods(); }
</script>
</body>
            </html>
