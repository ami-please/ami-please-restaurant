<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ami Please Restaurant</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
}

header{
background:#0077b6;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
}

button{
padding:8px 12px;
margin:5px;
cursor:pointer;
}

.food-card{
background:white;
padding:15px;
margin:10px;
border-radius:10px;
}

#loginPage{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#023e8a;
display:flex;
align-items:center;
justify-content:center;
}

.loginBox{
background:white;
padding:30px;
border-radius:10px;
}

#adminMenu{
display:none;
}

#adminOrders{
display:none;
background:white;
padding:15px;
margin:15px;
}

.order-card{
border:1px solid #ddd;
padding:10px;
margin:10px 0;
}

</style>
</head>

<body>

<!-- LOGIN -->

<div id="loginPage">

<div class="loginBox">

<h2>Ami Please Login</h2>

<input id="email" placeholder="email"><br><br>

<input id="password" type="password" placeholder="password"><br><br>

<button id="loginBtn">Login</button>

<button id="signupBtn">Signup</button>

<br><br>

<a id="forgotLink">Forgot password</a>

</div>

</div>

<!-- MENU -->

<div id="menu" style="display:none">

<header>

<div>Ami Please</div>

<div>

<span id="cartCount">0</span>

<button id="logoutBtn">Logout</button>

</div>

</header>

<div id="adminMenu">

<button id="viewOrdersBtn">View Orders</button>

</div>

<h3>Foods</h3>

<div id="foodList"></div>

<h3>Your Cart</h3>

<div id="cartItems"></div>

<button id="placeOrderBtn">Place Order</button>

</div>

<!-- ORDER FORM -->

<div id="orderForm" style="display:none">

<h3>Delivery Details</h3>

<input id="phone" placeholder="phone"><br><br>

<input id="area" placeholder="area"><br><br>

<input id="city" placeholder="city"><br><br>

<input id="pincode" placeholder="pincode"><br><br>

<input id="locationLink" placeholder="location"><br><br>

<button id="getLocationBtn">Get Location</button>

<button id="confirmOrderBtn">Confirm Order</button>

</div>

<!-- ADMIN ORDERS -->

<div id="adminOrders">

<h3>Orders</h3>

<div id="ordersList"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import {

getAuth,
signInWithEmailAndPassword,
createUserWithEmailAndPassword,
sendPasswordResetEmail,
onAuthStateChanged,
signOut

} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

import {

getFirestore,
collection,
addDoc,
getDocs,
updateDoc,
doc,
serverTimestamp

} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";


const firebaseConfig = {

apiKey:"AIzaSyA1bN6g1EW62p-sDhZh6XsRe78fsJWSe9I",
authDomain:"ami-please-restaurant.firebaseapp.com",
projectId:"ami-please-restaurant",
storageBucket:"ami-please-restaurant.appspot.com",
messagingSenderId:"590274660115",
appId:"1:590274660115:web:998a7c8bb31e4a2696fce6"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

const adminEmail="beejumble43@gmail.com";

let foods=[
{name:"Burger",price:120},
{name:"Pizza",price:250},
{name:"Pasta",price:180}
];

let cart=[];

const foodList=document.getElementById("foodList");

foods.forEach((f,i)=>{

const div=document.createElement("div");

div.className="food-card";

div.innerHTML=`
<h3>${f.name}</h3>
<p>₹${f.price}</p>
<button onclick="addCart(${i})">Add</button>
`;

foodList.appendChild(div);

});

window.addCart=(i)=>{

cart.push(foods[i]);

document.getElementById("cartCount").innerText=cart.length;

renderCart();

};

function renderCart(){

const cartItems=document.getElementById("cartItems");

cartItems.innerHTML="";

cart.forEach(c=>{

const d=document.createElement("div");

d.innerText=c.name+" ₹"+c.price;

cartItems.appendChild(d);

});

}

document.getElementById("loginBtn").onclick=async()=>{

const email=email.value;

const password=password.value;

await signInWithEmailAndPassword(auth,email,password);

};

document.getElementById("signupBtn").onclick=async()=>{

const email=email.value;

const password=password.value;

await createUserWithEmailAndPassword(auth,email,password);

};

document.getElementById("logoutBtn").onclick=()=>signOut(auth);

document.getElementById("forgotLink").onclick=()=>{

const emailPrompt=prompt("Enter email");

sendPasswordResetEmail(auth,emailPrompt);

};

onAuthStateChanged(auth,user=>{

if(user){

loginPage.style.display="none";

menu.style.display="block";

if(user.email===adminEmail){

adminMenu.style.display="block";

loadOrders();

}

}else{

loginPage.style.display="flex";

menu.style.display="none";

}

});

document.getElementById("placeOrderBtn").onclick=()=>{

orderForm.style.display="block";

};

document.getElementById("confirmOrderBtn").onclick=async()=>{

const phone=phone.value;

const area=area.value;

const city=city.value;

const pincode=pincode.value;

const locationLink=locationLink.value;

await addDoc(collection(db,"orders"),{

user:auth.currentUser.email,

cart:cart,

phone,

area,

city,

pincode,

locationLink,

status:"pending",

timestamp:serverTimestamp()

});

alert("Order placed");

cart=[];

renderCart();

};

document.getElementById("getLocationBtn").onclick=()=>{

navigator.geolocation.getCurrentPosition(p=>{

const lat=p.coords.latitude;

const lon=p.coords.longitude;

locationLink.value=`https://maps.google.com/?q=${lat},${lon}`;

});

};

async function loadOrders(){

const list=document.getElementById("ordersList");

list.innerHTML="";

const snap=await getDocs(collection(db,"orders"));

snap.forEach(d=>{

const o=d.data();

const div=document.createElement("div");

div.className="order-card";

div.innerHTML=`

<p>User: ${o.user}</p>
<p>Status: ${o.status}</p>

<button onclick="updateStatus('${d.id}','preparing')">Preparing</button>

<button onclick="updateStatus('${d.id}','delivered')">Delivered</button>

`;

list.appendChild(div);

});

}

window.updateStatus=async(id,status)=>{

await updateDoc(doc(db,"orders",id),{status});

loadOrders();

};

</script>

</body>
</html>
