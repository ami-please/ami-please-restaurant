<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ami Please Cafe & Restaurant</title>

<link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;600;800&display=swap" rel="stylesheet">

<style>

body{
font-family:'Urbanist',sans-serif;
margin:0;
background:#fafafa;
color:#222;
}

/* HEADER */

header{
background:#111;
color:white;
padding:18px;
font-size:24px;
font-weight:800;
letter-spacing:1px;
}

/* BANNER */

.banner{
height:240px;
background:url("https://images.unsplash.com/photo-1555992336-03a23c7b20ee?q=80&w=1200&auto=format&fit=crop");
background-size:cover;
background-position:center;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:34px;
font-weight:800;
text-shadow:0 4px 20px rgba(0,0,0,0.5);
}

/* MENU */

#menu{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
gap:16px;
padding:16px;
}

.food{
background:white;
border-radius:14px;
overflow:hidden;
box-shadow:0 6px 15px rgba(0,0,0,0.08);
transition:.2s;
}

.food:hover{
transform:translateY(-3px);
}

.food img{
width:100%;
height:140px;
object-fit:cover;
}

.info{
padding:10px;
}

.name{
font-weight:600;
}

.price{
color:#ff5200;
font-weight:700;
}

.rating{
font-size:13px;
color:gold;
}

.add{
margin-top:6px;
background:#ff5200;
color:white;
border:none;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
}

/* CART BUTTON */

.cart-btn{
position:fixed;
bottom:22px;
right:22px;
background:black;
color:white;
padding:14px 18px;
border-radius:40px;
cursor:pointer;
font-weight:600;
}

/* CART PANEL */

.cart{
position:fixed;
right:-100%;
top:0;
width:100%;
max-width:420px;
height:100%;
background:white;
transition:.3s;
box-shadow:-10px 0 25px rgba(0,0,0,0.2);
padding:20px;
overflow:auto;
}

.cart.active{
right:0;
}

.cart-item{
display:flex;
justify-content:space-between;
margin-bottom:10px;
}

.total{
font-size:18px;
font-weight:700;
}

.done{
background:#ff5200;
border:none;
color:white;
width:100%;
padding:12px;
margin-top:10px;
}

input{
width:100%;
padding:10px;
margin-bottom:10px;
}

.location{
width:100%;
padding:10px;
background:#eee;
border:none;
}

.order{
width:100%;
padding:12px;
background:#25D366;
border:none;
color:white;
font-weight:600;
}

</style>
</head>

<body>

<header>
Ami Please Cafe & Restaurant
</header>

<div class="banner">
Delicious Food Delivered Fast
</div>

<div id="menu"></div>

<div class="cart-btn" onclick="toggleCart()">
Cart (<span id="count">0</span>)
</div>

<div class="cart" id="cart">

<h2>Cart <span style="float:right;cursor:pointer" onclick="toggleCart()">✕</span></h2>

<div id="cartItems"></div>

<div class="total">
Total ₹ <span id="total">0</span>
</div>

<button class="done" onclick="showForm()">Done</button>

<form id="form" style="display:none">

<input id="phone" placeholder="Phone Number">
<input id="pincode" placeholder="Pincode">
<input id="city" placeholder="City">
<input id="district" placeholder="District">
<input id="house" placeholder="House Number">
<input id="area" placeholder="Area">

<button type="button" class="location" onclick="getLocation()">Use My Location</button>

<button type="button" class="order" onclick="order()">Send Order</button>

</form>

</div>

<script>

/* FAST IMAGE CDN */

function img(q){
return "https://source.unsplash.com/400x300/?"+q
}

/* 60+ FOODS */

const foods=[

["Zinger Burger",120,"burger"],
["Chicken Burger",110,"burger"],
["Cheese Burger",130,"burger"],
["Double Burger",150,"burger"],
["French Fries",80,"fries"],
["Loaded Fries",120,"fries"],
["Chicken Pizza",250,"pizza"],
["Veg Pizza",220,"pizza"],
["Paneer Pizza",240,"pizza"],
["BBQ Pizza",260,"pizza"],
["Chicken Shawarma",150,"shawarma"],
["Arabian Shawarma",170,"shawarma"],
["Chicken Roll",120,"roll"],
["Paneer Roll",110,"roll"],
["Egg Roll",100,"roll"],
["Chicken Biryani",200,"biryani"],
["Mutton Biryani",280,"biryani"],
["Veg Biryani",160,"biryani"],
["Chicken Momos",120,"momos"],
["Veg Momos",100,"momos"],
["Fried Momos",140,"momos"],
["Chicken Sandwich",90,"sandwich"],
["Grilled Sandwich",110,"sandwich"],
["Club Sandwich",130,"sandwich"],
["Cold Coffee",90,"coffee"],
["Cappuccino",110,"coffee"],
["Latte",120,"coffee"],
["Chocolate Shake",120,"shake"],
["Strawberry Shake",120,"shake"],
["Oreo Shake",140,"shake"],
["Vanilla Ice Cream",70,"icecream"],
["Chocolate Ice Cream",80,"icecream"],
["Chocolate Cake",150,"cake"],
["Red Velvet Cake",170,"cake"],
["Brownie",120,"brownie"],
["Pasta Alfredo",180,"pasta"],
["Chicken Pasta",200,"pasta"],
["Mac & Cheese",170,"pasta"],
["Chicken Nuggets",140,"nuggets"],
["Popcorn Chicken",150,"chicken"],
["Chicken Wings",180,"wings"],
["Tandoori Chicken",220,"tandoori"],
["Paneer Tikka",190,"tikka"],
["Garlic Bread",90,"bread"],
["Cheese Garlic Bread",120,"bread"],
["Veg Salad",100,"salad"],
["Chicken Salad",140,"salad"],
["Hot Dog",120,"hotdog"],
["Chicken Hot Dog",140,"hotdog"],
["Masala Maggi",80,"noodles"],
["Chicken Noodles",140,"noodles"],
["Veg Noodles",120,"noodles"]

]

let cart=[]

const menu=document.getElementById("menu")

foods.forEach((f,i)=>{

menu.innerHTML+=`
<div class="food">
<img loading="lazy" src="${img(f[2])}">
<div class="info">
<div class="name">${f[0]}</div>
<div class="rating">★★★★☆</div>
<div class="price">₹${f[1]}</div>
<button class="add" onclick="add(${i})">Add</button>
</div>
</div>
`

})

function add(i){
cart.push(foods[i])
update()
}

function update(){

document.getElementById("count").innerText=cart.length

let html=""
let total=0

cart.forEach(i=>{
html+=`<div class="cart-item">${i[0]} <span>₹${i[1]}</span></div>`
total+=i[1]
})

cartItems.innerHTML=html
total.innerText=total

}

function toggleCart(){
cart.classList.toggle("active")
}

function showForm(){
form.style.display="block"
}

let locationLink=""

function getLocation(){
navigator.geolocation.getCurrentPosition(p=>{
locationLink=`https://maps.google.com/?q=${p.coords.latitude},${p.coords.longitude}`
alert("Location Added")
})
}

function order(){

let msg="Order:%0A"

cart.forEach(i=>{
msg+=`${i[0]} ₹${i[1]}%0A`
})

msg+=`Total ₹${total.innerText}%0A`
msg+=`Phone:${phone.value}%0A`
msg+=`City:${city.value}%0A`
msg+=`Area:${area.value}%0A`
msg+=`Location:${locationLink}`

window.location.href=`sms:8899242083?body=${msg}`

}

</script>

</body>
</html>
