<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ami Please Restaurant - Login</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<!-- Animate.css -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

<style>
:root {
  --primary:#c9a227;
  --accent:#e94560;
  --bg:#0f0f1a;
  --card:#1a1a2e;
  --text:#fff;
  --text-muted:#a0a0a0;
  --radius:12px;
  --transition:0.4s ease;
}

body {
  font-family: 'Poppins', sans-serif;
  background: var(--bg);
  margin:0;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container {
  width: 350px;
  background: var(--card);
  padding: 30px;
  border-radius: var(--radius);
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  position: relative;
  overflow: hidden;
}

h2 {
  text-align:center;
  margin-bottom: 20px;
  color: var(--primary);
}

form {
  display: flex;
  flex-direction: column;
}

input {
  margin-bottom:15px;
  padding:12px 15px;
  border:none;
  border-radius: var(--radius);
  background:#2c2c3c;
  color: var(--text);
  font-size:14px;
}

input:focus {
  outline:none;
  box-shadow:0 0 8px var(--primary);
}

button {
  padding:12px;
  border:none;
  border-radius: var(--radius);
  background: var(--primary);
  color:white;
  font-weight:600;
  cursor:pointer;
  transition: var(--transition);
}

button:hover {
  background: var(--accent);
}

.toggle {
  text-align:center;
  margin-top:10px;
  color: var(--text-muted);
  font-size:13px;
  cursor:pointer;
}

.toggle span {
  color: var(--primary);
  font-weight:600;
}

/* Animation forms */
#signup-form {
  position:absolute;
  top:0;
  left:100%;
  width:100%;
  transition: var(--transition);
}

#signup-form.active {
  left:0;
}

#login-form.active {
  left:-100%;
}
</style>
</head>
<body>

<div class="container">

  <!-- Login Form -->
  <form id="login-form" class="animate__animated animate__fadeIn">
    <h2>Login</h2>
    <input type="email" id="login-email" placeholder="Email" required>
    <input type="password" id="login-password" placeholder="Password" required>
    <button type="button" onclick="login()">Login</button>
    <div class="toggle">Don't have an account? <span onclick="showSignup()">Sign Up</span></div>
    <div class="toggle"><span onclick="forgetPassword()">Forgot Password?</span></div>
  </form>

  <!-- Signup Form -->
  <form id="signup-form" class="animate__animated">
    <h2>Sign Up</h2>
    <input type="email" id="signup-email" placeholder="Email" required>
    <input type="password" id="signup-password" placeholder="Password" required>
    <button type="button" onclick="signup()">Sign Up</button>
    <div class="toggle">Already have an account? <span onclick="showLogin()">Login</span></div>
  </form>

</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendPasswordResetEmail } 
    from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA1bN6g1EW62p-sDhZh6XsRe78fsJWSe9I",
    authDomain: "ami-please-restaurant.firebaseapp.com",
    projectId: "ami-please-restaurant",
    storageBucket: "ami-please-restaurant.appspot.com",
    messagingSenderId: "590274660115",
    appId: "1:590274660115:web:998a7c8bb31e4a2696fce6",
    measurementId: "G-8FGXXT0Z8L"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // Forms
  const loginForm = document.getElementById("login-form");
  const signupForm = document.getElementById("signup-form");

  // Show signup
  window.showSignup = () => {
    signupForm.classList.add("active", "animate__fadeInRight");
    loginForm.classList.add("active", "animate__fadeOutLeft");
    setTimeout(() => loginForm.classList.remove("animate__fadeOutLeft"), 500);
  }

  // Show login
  window.showLogin = () => {
    signupForm.classList.remove("active");
    signupForm.classList.add("animate__fadeOutRight");
    loginForm.classList.remove("active");
    loginForm.classList.add("active", "animate__fadeInLeft");
    setTimeout(() => signupForm.classList.remove("animate__fadeOutRight"), 500);
  }

  // Signup function
  window.signup = () => {
    const email = document.getElementById("signup-email").value;
    const password = document.getElementById("signup-password").value;
    if(!email || !password) return alert("Enter email and password");
    createUserWithEmailAndPassword(auth, email, password)
      .then(() => alert("Account created successfully!"))
      .catch(err => alert(err.message));
  }

  // Login function
  window.login = () => {
    const email = document.getElementById("login-email").value;
    const password = document.getElementById("login-password").value;
    if(!email || !password) return alert("Enter email and password");
    signInWithEmailAndPassword(auth, email, password)
      .then(() => alert("Logged in successfully!"))
      .catch(err => alert(err.message));
  }

  // Forget password
  window.forgetPassword = () => {
    const email = document.getElementById("login-email").value;
    if(!email) return alert("Enter your email to reset password");
    sendPasswordResetEmail(auth, email)
      .then(() => alert("Password reset email sent!"))
      .catch(err => alert(err.message));
  }

</script>
</body>
</html>
