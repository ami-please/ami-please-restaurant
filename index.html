<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Ami Please Cafe & Restaurant</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f6f6f6;
}

header{
background:#ff5200;
color:white;
text-align:center;
padding:18px;
font-size:22px;
position:sticky;
top:0;
}

.banner{
width:100%;
height:220px;
object-fit:cover;
}

#search{
width:92%;
margin:15px;
padding:12px;
border-radius:10px;
border:1px solid #ccc;
font-size:16px;
}

.category{
font-size:24px;
font-weight:bold;
padding:15px;
}

.food{
background:white;
margin:12px;
border-radius:12px;
display:flex;
padding:12px;
box-shadow:0 2px 8px rgba(0,0,0,0.15);
}

.food img{
width:200px;
height:150px;
border-radius:12px;
object-fit:cover;
margin-right:15px;
}

.foodName{
font-size:18px;
font-weight:bold;
}

.rating{
color:#ffb400;
}

.price{
margin-top:6px;
font-size:16px;
}

.addBtn{
background:#ff5200;
color:white;
border:none;
padding:8px 14px;
border-radius:8px;
margin-top:10px;
cursor:pointer;
}

#cartIcon{
position:fixed;
bottom:20px;
right:20px;
background:#ff5200;
color:white;
padding:15px 18px;
border-radius:40px;
font-size:18px;
cursor:pointer;
box-shadow:0 3px 10px rgba(0,0,0,0.3);
}

#cartOverlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
justify-content:center;
align-items:flex-start;
padding-top:40px;
}

#cartContent{
background:white;
width:90%;
max-width:500px;
border-radius:12px;
padding:15px;
}

.closeBtn{
background:#ccc;
border:none;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
}

#detailsForm{
display:none;
margin-top:10px;
}

#detailsForm input{
width:100%;
padding:10px;
margin:6px 0;
border-radius:6px;
border:1px solid #ccc;
}

.placeBtn{
background:#28a745;
color:white;
border:none;
padding:12px;
width:100%;
border-radius:8px;
cursor:pointer;
}

</style>

</head>

<body>

<header>🍽 Ami Please Cafe & Restaurant</header>

<img class="banner"
src="https://images.unsplash.com/photo-1504674900247-0877df9cc836">

<input id="search" placeholder="Search food..." onkeyup="searchFood()">

<div id="menu"></div>

<div id="cartIcon" onclick="toggleCart()">
🛒 <span id="cartCount">0</span> ₹<span id="cartTotal">0</span>
</div>

<div id="cartOverlay">

<div id="cartContent">

<button class="closeBtn" onclick="toggleCart()">Exit</button>

<h2>Your Cart</h2>

<div id="cartItems"></div>

<h3 id="total"></h3>

<button onclick="showDetails()">Done</button>

<div id="detailsForm">

<input id="phone" placeholder="Phone Number">
<input id="house" placeholder="House Number">
<input id="area" placeholder="Area">
<input id="city" placeholder="City">
<input id="district" placeholder="District">
<input id="pincode" placeholder="Pincode">

<input id="location" placeholder="GPS location" readonly>

<button onclick="getLocation()">Get Location</button>

<button class="placeBtn" onclick="placeOrder()">Place Order</button>

</div>

</div>

</div>

<script>

let cart=[]

const foods=[

{name:"Steamed Momos",price:110,cat:"Momos",img:"https://images.unsplash.com/photo-1604908176997-4311c63b06a4",rating:4.5},
{name:"Fried Momos",price:110,cat:"Momos",img:"https://images.unsplash.com/photo-1625944525533-473f1c3d54e7",rating:4.6},
{name:"Schezwan Momos",price:150,cat:"Momos",img:"https://images.unsplash.com/photo-1626200419199-391ae4be7a41",rating:4.4},
{name:"Crispy Momos",price:140,cat:"Momos",img:"https://images.unsplash.com/photo-1604908554048-23fcb1a0c41c",rating:4.3},

{name:"Chicken Biryani",price:200,cat:"Indian Main Course",img:"https://images.unsplash.com/photo-1563379091339-03246963d96c",rating:4.8},
{name:"Mutton Biryani",price:240,cat:"Indian Main Course",img:"https://images.unsplash.com/photo-1604908177522-402d5d8f4a3d",rating:4.7},

{name:"Chicken 65",price:180,cat:"Starters",img:"https://images.unsplash.com/photo-1601050690597-df0568f70950",rating:4.7},
{name:"French Fries",price:110,cat:"Starters",img:"https://images.unsplash.com/photo-1550547660-d9450f859349",rating:4.4},
{name:"Cheese Fries",price:140,cat:"Starters",img:"https://images.unsplash.com/photo-1550547660-d9450f859349",rating:4.5},
{name:"Peri Peri Fries",price:130,cat:"Starters",img:"https://images.unsplash.com/photo-1550547660-d9450f859349",rating:4.3},

{name:"Chicken Fried Rice",price:180,cat:"Chinese",img:"https://images.unsplash.com/photo-1603133872878-684f208fb84b",rating:4.6},
{name:"Veg Fried Rice",price:150,cat:"Chinese",img:"https://images.unsplash.com/photo-1603133872878-684f208fb84b",rating:4.4},

{name:"Rumali Roti",price:30,cat:"Breads",img:"https://images.unsplash.com/photo-1601050690597-df0568f70950",rating:4.2},

{name:"Tea",price:25,cat:"Tea & Coffee",img:"https://images.unsplash.com/photo-1495474472287-4d71bcdd2085",rating:4.5},
{name:"Coffee",price:40,cat:"Tea & Coffee",img:"https://images.unsplash.com/photo-1495474472287-4d71bcdd2085",rating:4.6}

]

function renderMenu(){

let html=""
let current=""

foods.forEach(f=>{

if(f.cat!=current){

current=f.cat
html+="<div class='category'>"+current+"</div>"

}

html+=`
<div class="food">

<img src="${f.img}">

<div>

<div class="foodName">${f.name}</div>

<div class="rating">${f.rating} ⭐</div>

<div class="price">₹${f.price}</div>

<button class="addBtn" onclick="addToCart('${f.name}',${f.price})">
Add
</button>

</div>

</div>
`

})

menu.innerHTML=html

}

renderMenu()

function addToCart(name,price){

let item=cart.find(i=>i.name==name)

if(item){item.qty++}

else{cart.push({name,price,qty:1})}

updateCart()

}

function updateCart(){

let count=0
let total=0

cart.forEach(i=>{
count+=i.qty
total+=i.qty*i.price
})

cartCount.innerText=count
cartTotal.innerText=total

renderCart()

}

function renderCart(){

let html=""
let total=0

cart.forEach(i=>{
html+=`${i.name} x${i.qty} ₹${i.price*i.qty}<br>`
total+=i.price*i.qty
})

cartItems.innerHTML=html
document.getElementById("total").innerText="Total ₹"+total

}

function toggleCart(){

let c=document.getElementById("cartOverlay")

c.style.display=c.style.display=="flex"?"none":"flex"

}

function showDetails(){

detailsForm.style.display="block"

}

function getLocation(){

navigator.geolocation.getCurrentPosition(p=>{
location.value=p.coords.latitude+","+p.coords.longitude
})

}

function placeOrder(){

let msg="New Order - Ami Please Cafe\n\n"

cart.forEach(i=>{
msg+=i.name+" x"+i.qty+"\n"
})

msg+="\nPhone:"+phone.value
msg+="\nHouse:"+house.value
msg+="\nArea:"+area.value
msg+="\nCity:"+city.value
msg+="\nDistrict:"+district.value
msg+="\nPincode:"+pincode.value
msg+="\nLocation:https://maps.google.com/?q="+location.value

window.location.href="sms:8899242083?body="+encodeURIComponent(msg)

}

function searchFood(){

let s=search.value.toLowerCase()

document.querySelectorAll(".food").forEach(f=>{
f.style.display=f.innerText.toLowerCase().includes(s)?"flex":"none"
})

}

</script>

</body>
</html>
