<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ami Please Cafe & Restaurant</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins;
margin:0;
background:#f5f5f5;
}

header{
background:#ff5200;
color:white;
padding:15px;
font-size:22px;
font-weight:600;
}

#menu{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
padding:15px;
}

.food{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 4px 10px rgba(0,0,0,.1);
}

.food img{
width:100%;
height:160px;
object-fit:cover;
}

.food-info{
padding:10px;
}

.food-name{
font-weight:600;
}

.food-price{
color:#ff5200;
font-weight:bold;
}

.rating{
color:gold;
font-size:14px;
}

.add{
background:#ff5200;
color:white;
border:none;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
}

.cart-btn{
position:fixed;
bottom:20px;
right:20px;
background:black;
color:white;
padding:14px 20px;
border-radius:30px;
cursor:pointer;
}

.cart{
position:fixed;
right:-100%;
top:0;
width:100%;
max-width:400px;
height:100%;
background:white;
transition:.3s;
box-shadow:-5px 0 20px rgba(0,0,0,.2);
overflow:auto;
padding:20px;
}

.cart.active{
right:0;
}

.cart-item{
display:flex;
justify-content:space-between;
margin-bottom:10px;
}

.total{
font-weight:bold;
font-size:18px;
margin-top:10px;
}

.done{
background:#ff5200;
color:white;
border:none;
width:100%;
padding:12px;
margin-top:10px;
}

.close{
font-size:22px;
cursor:pointer;
}

form{
display:none;
}

input{
width:100%;
padding:10px;
margin-bottom:10px;
}

.location{
background:#eee;
padding:10px;
border:none;
width:100%;
margin-bottom:10px;
}

.order{
background:#25D366;
color:white;
padding:12px;
border:none;
width:100%;
}

</style>
</head>

<body>

<header>
Ami Please Cafe & Restaurant
</header>

<div id="menu"></div>

<div class="cart-btn" onclick="toggleCart()">
Cart (<span id="count">0</span>)
</div>

<div class="cart" id="cart">

<div style="display:flex;justify-content:space-between">
<h2>Cart</h2>
<div class="close" onclick="toggleCart()">✕</div>
</div>

<div id="cartItems"></div>

<div class="total">
Total ₹ <span id="total">0</span>
</div>

<button class="done" onclick="showForm()">Done</button>

<form id="orderForm">

<input placeholder="Phone Number" id="phone">

<input placeholder="Pincode" id="pincode">

<input placeholder="City" id="city">

<input placeholder="District" id="district">

<input placeholder="House Number" id="house">

<input placeholder="Area" id="area">

<button type="button" class="location" onclick="getLocation()">Use My Location</button>

<button type="button" class="order" onclick="placeOrder()">Send Order</button>

</form>

</div>

<script>

const foods = [

{name:"Zinger Burger",price:120,img:"https://source.unsplash.com/400x300/?burger"},
{name:"Chicken Burger",price:110,img:"https://source.unsplash.com/400x300/?chicken-burger"},
{name:"Cheese Burger",price:130,img:"https://source.unsplash.com/400x300/?cheese-burger"},
{name:"French Fries",price:80,img:"https://source.unsplash.com/400x300/?fries"},
{name:"Chicken Pizza",price:250,img:"https://source.unsplash.com/400x300/?pizza"},
{name:"Veg Pizza",price:220,img:"https://source.unsplash.com/400x300/?veg-pizza"},
{name:"Chicken Shawarma",price:150,img:"https://source.unsplash.com/400x300/?shawarma"},
{name:"Chicken Roll",price:120,img:"https://source.unsplash.com/400x300/?chicken-roll"},
{name:"Paneer Roll",price:110,img:"https://source.unsplash.com/400x300/?paneer-roll"},
{name:"Chicken Biryani",price:200,img:"https://source.unsplash.com/400x300/?biryani"},
{name:"Mutton Biryani",price:280,img:"https://source.unsplash.com/400x300/?mutton-biryani"},
{name:"Chicken Momos",price:120,img:"https://source.unsplash.com/400x300/?momos"},
{name:"Veg Momos",price:100,img:"https://source.unsplash.com/400x300/?veg-momos"},
{name:"Chicken Sandwich",price:90,img:"https://source.unsplash.com/400x300/?sandwich"},
{name:"Grilled Sandwich",price:110,img:"https://source.unsplash.com/400x300/?grilled-sandwich"},
{name:"Cold Coffee",price:90,img:"https://source.unsplash.com/400x300/?cold-coffee"},
{name:"Chocolate Shake",price:120,img:"https://source.unsplash.com/400x300/?chocolate-shake"},
{name:"Strawberry Shake",price:120,img:"https://source.unsplash.com/400x300/?strawberry-milkshake"},
{name:"Ice Cream",price:70,img:"https://source.unsplash.com/400x300/?ice-cream"},
{name:"Chocolate Cake",price:150,img:"https://source.unsplash.com/400x300/?chocolate-cake"}

];

let cart=[]

const menu=document.getElementById("menu")

foods.forEach((f,i)=>{
menu.innerHTML+=`
<div class="food">
<img src="${f.img}">
<div class="food-info">
<div class="food-name">${f.name}</div>
<div class="rating">★★★★☆</div>
<div class="food-price">₹${f.price}</div>
<button class="add" onclick="add(${i})">Add</button>
</div>
</div>`
})

function add(i){
cart.push(foods[i])
updateCart()
}

function updateCart(){

document.getElementById("count").innerText=cart.length

let items=""
let total=0

cart.forEach(i=>{
items+=`<div class="cart-item">${i.name}<span>₹${i.price}</span></div>`
total+=i.price
})

document.getElementById("cartItems").innerHTML=items
document.getElementById("total").innerText=total

}

function toggleCart(){
document.getElementById("cart").classList.toggle("active")
}

function showForm(){
document.getElementById("orderForm").style.display="block"
}

let userLocation=""

function getLocation(){
navigator.geolocation.getCurrentPosition(pos=>{
userLocation=`https://maps.google.com/?q=${pos.coords.latitude},${pos.coords.longitude}`
alert("Location added")
})
}

function placeOrder(){

let total=document.getElementById("total").innerText

let text="Order:%0A"

cart.forEach(i=>{
text+=`${i.name} ₹${i.price}%0A`
})

text+=`Total ₹${total}%0A`

text+=`Phone:${phone.value}%0A`
text+=`City:${city.value}%0A`
text+=`Area:${area.value}%0A`
text+=`Location:${userLocation}`

window.location.href=`sms:8899242083?body=${text}`

}

</script>

</body>
</html>
