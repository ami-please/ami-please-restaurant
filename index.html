<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ami Please Cafe & Restaurant</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins;
background:#0f0f1a;
color:white;
}

header{
position:fixed;
top:0;
width:100%;
background:#111;
padding:15px;
display:flex;
justify-content:space-between;
z-index:1000;
}

.logo{
font-size:20px;
font-weight:600;
}

.cart-btn{
background:#ff3d3d;
padding:8px 14px;
border-radius:20px;
cursor:pointer;
}

.hero{
margin-top:60px;
height:220px;
background:url("https://images.unsplash.com/photo-1517248135467-4c7edcad34c4") center/cover;
display:flex;
align-items:center;
justify-content:center;
}

.hero h1{
background:rgba(0,0,0,0.6);
padding:10px 20px;
border-radius:10px;
}

.menu{
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
}

.food{
background:#1b1b2f;
border-radius:10px;
overflow:hidden;
}

.food img{
width:100%;
height:150px;
object-fit:cover;
}

.food-info{
padding:10px;
}

.price{
color:#ffd700;
}

.rating{
color:#ffd700;
font-size:13px;
}

button{
margin-top:6px;
padding:6px 10px;
border:none;
background:#ff3d3d;
color:white;
border-radius:6px;
cursor:pointer;
}

.upload{
width:100%;
margin-top:6px;
}

.cart{
position:fixed;
right:-350px;
top:0;
width:320px;
height:100%;
background:#111;
padding:20px;
transition:0.4s;
overflow:auto;
}

.cart.active{
right:0;
}

.cart-item{
display:flex;
justify-content:space-between;
margin-bottom:8px;
}

.total{
margin-top:15px;
font-weight:bold;
}

</style>
</head>

<body>

<header>
<div class="logo">Ami Please</div>
<div class="cart-btn" onclick="toggleCart()">Cart (<span id="count">0</span>)</div>
</header>

<div class="hero">
<h1>Ami Please Cafe & Restaurant</h1>
</div>

<div class="menu" id="menu"></div>

<div class="cart" id="cartBox">

<h3>Your Cart</h3>

<div id="cartItems"></div>

<div class="total">
Total ₹ <span id="total">0</span>
</div>

</div>

<script>

const foods=[

{name:"Steamed Momos",price:120},
{name:"Fried Momos",price:130},
{name:"Afghani Momos",price:150},
{name:"Tandoori Momos",price:140},
{name:"Chilli Momos",price:150},

{name:"Chicken Biryani",price:250},
{name:"Chicken Fried Rice",price:250},
{name:"Veg Fried Rice",price:200},
{name:"Schezwan Chicken Rice",price:280},
{name:"Schezwan Veg Rice",price:250},

{name:"Roomali Roti",price:25},
{name:"Butter Naan",price:60},
{name:"Plain Naan",price:40},

{name:"Chicken Shawarma Roll",price:170},
{name:"Chicken Roll",price:150},
{name:"Veg Roll",price:100},

{name:"Margherita Pizza",price:200},
{name:"Farmhouse Pizza",price:250},
{name:"Chicken Pizza",price:280},

{name:"French Fries",price:100},
{name:"Cheese Fries",price:120},

{name:"Chicken Wings",price:220},
{name:"Chicken Nuggets",price:180},

{name:"Paneer Tikka",price:250},
{name:"Chicken Tikka",price:300},

{name:"Paneer Butter Masala",price:260},
{name:"Chicken Butter Masala",price:320},

{name:"Cold Coffee",price:120},
{name:"Cappuccino",price:140},
{name:"Latte",price:150},

{name:"Chocolate Shake",price:150},
{name:"Oreo Shake",price:160},

{name:"Vanilla Ice Cream",price:90},
{name:"Chocolate Ice Cream",price:100},

{name:"Brownie",price:150},
{name:"Chocolate Cake",price:200}

]

const menu=document.getElementById("menu")

foods.forEach((f,i)=>{

let savedImage=localStorage.getItem("foodImage"+i)

let img=savedImage ? savedImage : "https://picsum.photos/300?random="+i

let hideUpload=savedImage ? "display:none" : ""

menu.innerHTML+=`

<div class="food">

<img id="img${i}" src="${img}">

<div class="food-info">

<div>${f.name}</div>

<div class="rating">⭐4.5</div>

<div class="price">₹${f.price}</div>

<button onclick="addCart('${f.name}',${f.price})">Add</button>

<input 
type="file"
id="upload${i}"
class="upload"
accept="image/*"
style="${hideUpload}"
onchange="saveImage(event,'img${i}',${i})">

</div>

</div>

`

})

let cart=[]

function addCart(name,price){

cart.push({name,price})
updateCart()

}

function updateCart(){

let html=""
let total=0

cart.forEach(c=>{

html+=`<div class="cart-item">
<span>${c.name}</span>
<span>₹${c.price}</span>
</div>`

total+=c.price

})

document.getElementById("cartItems").innerHTML=html
document.getElementById("total").innerText=total
document.getElementById("count").innerText=cart.length

}

function toggleCart(){

document.getElementById("cartBox").classList.toggle("active")

}

function saveImage(e,imgId,index){

const file=e.target.files[0]

const reader=new FileReader()

reader.onload=function(){

document.getElementById(imgId).src=reader.result

localStorage.setItem("foodImage"+index,reader.result)

document.getElementById("upload"+index).style.display="none"

}

reader.readAsDataURL(file)

}

</script>

</body>
</html>
