<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ami Please Restaurant</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

header{
background:#1d3557;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
}

button{
padding:8px 12px;
cursor:pointer;
border:none;
background:#457b9d;
color:white;
border-radius:5px;
}

input{
padding:8px;
margin:5px 0;
width:100%;
}

#loginPage{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#1d3557;
display:flex;
align-items:center;
justify-content:center;
}

.loginBox{
background:white;
padding:30px;
border-radius:10px;
width:250px;
}

.food-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
padding:10px;
}

.food-card{
background:white;
padding:15px;
border-radius:10px;
}

#cartPanel{
background:white;
padding:10px;
margin:10px;
border-radius:10px;
}

#orderOverlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
align-items:center;
justify-content:center;
}

.orderBox{
background:white;
padding:20px;
border-radius:10px;
width:300px;
}

#adminOrders{
display:none;
background:white;
margin:10px;
padding:10px;
border-radius:10px;
}

.orderCard{
border-bottom:1px solid #ddd;
padding:10px;
}

</style>

</head>

<body>

<!-- LOGIN PAGE -->

<div id="loginPage">

<div class="loginBox">

<h3>Login</h3>

<input id="email" placeholder="Email">

<input id="password" type="password" placeholder="Password">

<button id="loginBtn">Login</button>

<button id="signupBtn">Signup</button>

<p id="forgotBtn" style="color:blue;cursor:pointer">Forgot Password</p>

</div>

</div>


<!-- MAIN MENU -->

<div id="menu" style="display:none">

<header>

<h3>Ami Please</h3>

<div>

Cart: <span id="cartCount">0</span>

<button id="logoutBtn">Logout</button>

</div>

</header>

<div id="adminPanel" style="display:none;padding:10px">

<button id="viewOrdersBtn">View Orders</button>

</div>

<div class="food-grid" id="foodList"></div>

<div id="cartPanel">

<h3>Your Cart</h3>

<div id="cartItems"></div>

<button id="doneCartBtn">Done</button>

</div>

</div>


<!-- ORDER FORM OVERLAY -->

<div id="orderOverlay">

<div class="orderBox">

<h3>Delivery Details</h3>

<input id="phone" placeholder="Phone">

<input id="area" placeholder="Area">

<input id="city" placeholder="City">

<input id="pincode" placeholder="Pincode">

<input id="locationLink" placeholder="Location link">

<button id="getLocationBtn">Get My Location</button>

<button id="confirmOrderBtn">Confirm Order</button>

</div>

</div>


<!-- ADMIN ORDERS -->

<div id="adminOrders">

<h3>Orders</h3>

<div id="ordersList"></div>

</div>



<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword,
createUserWithEmailAndPassword,
sendPasswordResetEmail,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
doc,
updateDoc,
serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";


const firebaseConfig = {

apiKey:"AIzaSyA1bN6g1EW62p-sDhZh6XsRe78fsJWSe9I",
authDomain:"ami-please-restaurant.firebaseapp.com",
projectId:"ami-please-restaurant",
storageBucket:"ami-please-restaurant.appspot.com",
messagingSenderId:"590274660115",
appId:"1:590274660115:web:998a7c8bb31e4a2696fce6"

};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const adminEmail="beejumble43@gmail.com";

let foods=[
{name:"Burger",price:120},
{name:"Pizza",price:250},
{name:"Pasta",price:180},
{name:"Sandwich",price:100},
{name:"Fries",price:80},
{name:"Cold Coffee",price:90}
];

let cart=[];

const foodList=document.getElementById("foodList");

foods.forEach((f,i)=>{

const div=document.createElement("div");

div.className="food-card";

div.innerHTML=`

<h4>${f.name}</h4>
<p>₹${f.price}</p>
<button onclick="addCart(${i})">Add</button>

`;

foodList.appendChild(div);

});


window.addCart=(i)=>{

cart.push(foods[i]);

document.getElementById("cartCount").innerText=cart.length;

renderCart();

};


function renderCart(){

const cartItems=document.getElementById("cartItems");

cartItems.innerHTML="";

cart.forEach((c,index)=>{

const div=document.createElement("div");

div.innerHTML=`
${c.name} ₹${c.price}
`;

cartItems.appendChild(div);

});

}


document.getElementById("doneCartBtn").onclick=()=>{

if(cart.length===0){

alert("Cart empty");

return;

}

document.getElementById("orderOverlay").style.display="flex";

};



document.getElementById("getLocationBtn").onclick=()=>{

navigator.geolocation.getCurrentPosition(pos=>{

const lat=pos.coords.latitude;
const lon=pos.coords.longitude;

document.getElementById("locationLink").value=
`https://maps.google.com/?q=${lat},${lon}`;

});

};



document.getElementById("confirmOrderBtn").onclick=async()=>{

const phone=document.getElementById("phone").value;
const area=document.getElementById("area").value;
const city=document.getElementById("city").value;
const pincode=document.getElementById("pincode").value;
const location=document.getElementById("locationLink").value;

await addDoc(collection(db,"orders"),{

user:auth.currentUser.email,

cart:cart,

phone,
area,
city,
pincode,

location,

status:"pending",

time:serverTimestamp()

});

alert("Order placed");

cart=[];
renderCart();

document.getElementById("cartCount").innerText=0;

document.getElementById("orderOverlay").style.display="none";

};



document.getElementById("loginBtn").onclick=async()=>{

await signInWithEmailAndPassword(
auth,
email.value,
password.value
);

};


document.getElementById("signupBtn").onclick=async()=>{

await createUserWithEmailAndPassword(
auth,
email.value,
password.value
);

};


document.getElementById("forgotBtn").onclick=()=>{

const mail=prompt("Enter email");

sendPasswordResetEmail(auth,mail);

};


document.getElementById("logoutBtn").onclick=()=>signOut(auth);



onAuthStateChanged(auth,user=>{

if(user){

loginPage.style.display="none";
menu.style.display="block";

if(user.email===adminEmail){

adminPanel.style.display="block";

}

}else{

loginPage.style.display="flex";
menu.style.display="none";

}

});



document.getElementById("viewOrdersBtn").onclick=()=>{

adminOrders.style.display="block";

loadOrders();

};



async function loadOrders(){

const list=document.getElementById("ordersList");

list.innerHTML="";

const snap=await getDocs(collection(db,"orders"));

snap.forEach(d=>{

const o=d.data();

const div=document.createElement("div");

div.className="orderCard";

div.innerHTML=`

<p><b>User:</b> ${o.user}</p>

<p><b>Phone:</b> ${o.phone}</p>

<p><b>Address:</b> ${o.area}, ${o.city}</p>

<p><b>Status:</b> ${o.status}</p>

<button onclick="updateStatus('${d.id}','preparing')">Preparing</button>

<button onclick="updateStatus('${d.id}','delivered')">Delivered</button>

`;

list.appendChild(div);

});

}



window.updateStatus=async(id,status)=>{

await updateDoc(doc(db,"orders",id),{status});

loadOrders();

};


</script>

</body>
</html>
