<!DOCTYPE html>
<html>
<head>

<title>Ami Please Restaurant</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
margin:0;
background:#111;
color:white;
}

/* LOGIN */

#loginPage{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:#1e1e1e;
padding:30px;
border-radius:10px;
width:320px;
text-align:center;
}

input{
width:90%;
padding:10px;
margin:10px;
border:none;
border-radius:5px;
}

button{
padding:10px 15px;
background:gold;
border:none;
border-radius:5px;
cursor:pointer;
}

a{
color:gold;
cursor:pointer;
}

/* MENU */

#menuPage{
display:none;
background:#fafafa;
color:black;
min-height:100vh;
}

header{
background:#ff4d4d;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

.search{
text-align:center;
padding:10px;
}

.search input{
width:80%;
padding:10px;
border:1px solid #ddd;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:20px;
}

.food{
background:white;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
padding:10px;
text-align:center;
}

.food img{
width:100%;
height:150px;
object-fit:cover;
border-radius:10px;
}

.qty{
display:flex;
justify-content:center;
gap:10px;
margin-top:10px;
}

.qty button{
background:#ff4d4d;
color:white;
}

/* CART */

.cartBtn{
position:fixed;
bottom:20px;
right:20px;
background:black;
color:white;
padding:12px 20px;
border-radius:20px;
cursor:pointer;
}

#cartBox{
position:fixed;
top:0;
right:-350px;
width:350px;
height:100%;
background:white;
color:black;
padding:20px;
box-shadow:-5px 0 10px rgba(0,0,0,0.3);
transition:0.4s;
overflow:auto;
}

.cartItem{
border-bottom:1px solid #ddd;
padding:10px;
}

</style>

</head>

<body>


<!-- LOGIN -->

<div id="loginPage">

<div class="box">

<h2>Ami Please</h2>

<div id="loginBox">

<input id="loginEmail" placeholder="Email">

<input id="loginPassword" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<p><a onclick="showSignup()">Create account</a></p>

<p><a onclick="resetPassword()">Forgot password</a></p>

</div>

<div id="signupBox" style="display:none">

<input id="signupEmail" placeholder="Email">

<input id="signupPassword" type="password" placeholder="Password">

<button onclick="signup()">Signup</button>

<p><a onclick="showLogin()">Back</a></p>

</div>

</div>

</div>


<!-- MENU -->

<div id="menuPage">

<header>

Ami Please Cafe & Restaurant

</header>

<div class="search">

<input id="search" placeholder="Search food..." onkeyup="searchFood()">

</div>

<div class="grid" id="menu"></div>

<div class="cartBtn" onclick="openCart()">

Cart (<span id="count">0</span>)

</div>

</div>


<!-- CART -->

<div id="cartBox">

<h2>Your Cart</h2>

<div id="orders"></div>

<h3 id="total"></h3>

<button onclick="placeOrder()">Place Order</button>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendPasswordResetEmail }
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";


/* FIREBASE CONFIG */

const firebaseConfig={
apiKey:"YOUR_API_KEY",
authDomain:"YOUR_DOMAIN",
projectId:"YOUR_PROJECT_ID"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);


/* LOGIN SYSTEM */

window.showSignup=()=>{

loginBox.style.display="none"
signupBox.style.display="block"

}

window.showLogin=()=>{

signupBox.style.display="none"
loginBox.style.display="block"

}

window.signup=()=>{

createUserWithEmailAndPassword(auth,signupEmail.value,signupPassword.value)
.then(()=>{

alert("Account created")
showLogin()

})
.catch(e=>alert(e.message))

}

window.login=()=>{

signInWithEmailAndPassword(auth,loginEmail.value,loginPassword.value)
.then(()=>{

loginPage.style.display="none"
menuPage.style.display="block"

})
.catch(e=>alert(e.message))

}

window.resetPassword=()=>{

sendPasswordResetEmail(auth,loginEmail.value)
.then(()=>alert("Reset email sent"))

}


/* MENU ITEMS */

const foods=[

{name:"Veg Momos",price:80,img:"https://images.unsplash.com/photo-1604908176997-125f25cc6f3d"},
{name:"Fried Momos",price:100,img:"https://images.unsplash.com/photo-1625943553852-781c6dd46faa"},
{name:"Burger",price:150,img:"https://images.unsplash.com/photo-1550547660-d9450f859349"},
{name:"Pizza",price:250,img:"https://images.unsplash.com/photo-1601924928376-4c9b13e0a5d9"},
{name:"Chicken Roll",price:120,img:"https://images.unsplash.com/photo-1601050690597-df0568f70950"},
{name:"Sandwich",price:90,img:"https://images.unsplash.com/photo-1528735602780-2552fd46c7af"},
{name:"French Fries",price:70,img:"https://images.unsplash.com/photo-1541592106381-b31e9677c0e5"}

]

let cart={}


/* DISPLAY MENU */

function showMenu(list){

menu.innerHTML=""

list.forEach((f,i)=>{

menu.innerHTML+=`

<div class="food">

<img src="${f.img}">

<h3>${f.name}</h3>

<p>₹${f.price}</p>

<div class="qty">

<button onclick="remove(${i})">-</button>

<span id="q${i}">0</span>

<button onclick="add(${i})">+</button>

</div>

</div>

`

})

}

showMenu(foods)


/* SEARCH */

window.searchFood=()=>{

let s=search.value.toLowerCase()

let filtered=foods.filter(f=>f.name.toLowerCase().includes(s))

showMenu(filtered)

}


/* CART */

window.add=(i)=>{

cart[i]=(cart[i]||0)+1

document.getElementById("q"+i).innerText=cart[i]

updateCart()

}

window.remove=(i)=>{

if(cart[i]) cart[i]--

document.getElementById("q"+i).innerText=cart[i]||0

updateCart()

}

function updateCart(){

let c=0

for(let i in cart) c+=cart[i]

count.innerText=c

}


/* CART PANEL */

window.openCart=()=>{

cartBox.style.right="0"

orders.innerHTML=""

let total=0

for(let i in cart){

if(cart[i]>0){

let item=foods[i]

orders.innerHTML+=`

<div class="cartItem">

${item.name} x ${cart[i]} = ₹${item.price*cart[i]}

</div>

`

total+=item.price*cart[i]

}

}

total.innerText="Total ₹"+total

}


/* ORDER */

window.placeOrder=()=>{

alert("Order placed successfully!")

cart={}

count.innerText=0

cartBox.style.right="-350px"

showMenu(foods)

}

</script>

</body>
  </html>
