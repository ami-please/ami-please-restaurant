<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ami Please Restaurant</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
  --primary: #1e3a8a;
  --secondary: #111827;
  --bg: #f3f4f6;
  --accent: #3b82f6;
  --radius: 12px;
  --transition: 0.3s;
}
body {
  font-family: 'Poppins', sans-serif;
  margin:0; padding:0;
  background: var(--bg);
}
button { cursor:pointer; transition: var(--transition); }

/* Login Page */
#loginPage {
  position: fixed; top:0; left:0; width:100%; height:100%;
  background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), #3b82f6;
  display:flex; align-items:center; justify-content:center; z-index:1000;
}
.loginBox {
  background:#fff; padding:40px; border-radius:var(--radius); width:90%; max-width:400px; text-align:center;
  box-shadow:0 8px 20px rgba(0,0,0,0.3);
}
.loginBox h2 {
  font-family: 'Playfair Display', serif;
  color: var(--primary); margin-bottom:10px;
}
.input-group { margin-bottom:15px; text-align:left; }
.input-group input { width:100%; padding:12px; border-radius:var(--radius); border:1px solid #ddd; outline:none; }

/* Header */
header {
  display:flex; justify-content:space-between; align-items:center;
  padding:15px 20px; background:white; position:sticky; top:0; z-index:10;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}
.logo { font-family:'Playfair Display', serif; font-size:22px; color:var(--primary);}
.cart-icon { position:relative; font-size:24px; color:var(--secondary);}
.cart-badge { position:absolute; top:-8px; right:-8px; background:var(--accent); color:white;
  font-size:12px; width:20px; height:20px; border-radius:50%; display:flex; align-items:center; justify-content:center;}

/* Banner */
.banner {
  background: var(--accent); height:120px;
  display:flex; align-items:center; justify-content:center;
  color:white; font-family:'Playfair Display',serif; font-size:28px; font-weight:600;
  margin-bottom:20px;
  border-radius: var(--radius);
  margin: 20px;
}

/* Food grid */
.container {
  max-width: 1200px; margin:0 auto; padding:0 15px;
  display:grid; grid-template-columns: repeat(2, 1fr); gap:15px;
}
.food-card {
  background:white; padding:15px; border-radius:var(--radius);
  box-shadow:0 4px 15px rgba(0,0,0,0.08); display:flex; flex-direction:column; align-items:center;
}
.food-info { text-align:center; margin-bottom:10px; }
.food-actions { display:flex; justify-content:center; align-items:center; gap:10px; }
.add-btn, .minus-btn {
  background: var(--primary); color:white; border:none; border-radius:50%; width:35px; height:35px; font-weight:600;
}
.add-btn:hover, .minus-btn:hover { transform:scale(1.1); }

/* Admin buttons */
.admin-food-options { margin-top:10px; display:flex; gap:10px; }
.admin-food-options i { cursor:pointer; }

/* Modals */
#adminPanel,#cartModal,#orderFormOverlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; z-index:1000;}
.admin-form,.cart-panel,.order-form { background:white; padding:20px; border-radius:var(--radius); width:90%; max-width:400px; display:flex; flex-direction:column; gap:10px; }
.cart-items { max-height:300px; overflow-y:auto; }
.cart-item { display:flex; justify-content:space-between; padding:5px 0; }

/* Thanks popup */
#thanksPopup { position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
  background:var(--primary); color:white; padding:15px 25px; border-radius:var(--radius); display:none; z-index:1000; font-weight:600;}
#thanksPopup.show { display:block; animation:fadeInOut 2s forwards;}
@keyframes fadeInOut {0%{opacity:0;}10%,90%{opacity:1;}100%{opacity:0;}}
</style>
</head>
<body>

<!-- LOGIN PAGE -->
<div id="loginPage">
  <div class="loginBox">
    <h2>Ami Please</h2>
    <p>Order your favorite food</p>
    <div class="input-group"><label>Email</label><input id="email" type="email" placeholder="Enter your email"></div>
    <div class="input-group"><label>Password</label><input id="password" type="password" placeholder="Enter your password"></div>
    <button onclick="login()">Login</button>
    <button onclick="signup()">Signup</button>
    <div class="auth-toggle"><a onclick="forgot()">Forgot Password?</a></div>
  </div>
</div>

<!-- MENU -->
<div id="menu" style="display:none;">
  <header>
    <div class="logo">Ami Please</div>
    <div>
      <span class="cart-icon" onclick="toggleCart()">
        <i class="fas fa-shopping-cart"></i>
        <span id="cartCount" class="cart-badge">0</span>
      </span>
      <button onclick="logout()" style="margin-left:10px;">Logout</button>
    </div>
  </header>
  <div class="banner">Delicious Food Delivered</div>
  <div class="admin-menu" id="adminMenu" style="display:none;">
    <button onclick="openAdminPanel()">Add Food</button>
    <button onclick="showOrders()">Orders</button>
  </div>
  <div class="container" id="foodList"></div>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel">
  <div class="admin-form">
    <h3 id="adminFormTitle">Add Food</h3>
    <input type="text" id="foodName" placeholder="Food Name">
    <input type="number" id="foodPrice" placeholder="Price">
    <input type="number" id="foodRating" placeholder="Rating 1-5">
    <button onclick="submitFood()">Submit</button>
    <button onclick="closeAdminPanel()" style="background:#ccc;color:#000;">Cancel</button>
  </div>
</div>

<!-- CART -->
<div id="cartModal">
  <div class="cart-panel">
    <div class="cart-header">
      <h3>Your Cart</h3>
      <span class="close-cart" onclick="toggleCart()">&times;</span>
    </div>
    <div id="cartItems" class="cart-items"></div>
    <div class="cart-footer">
      <div class="total-row"><span>Total:</span><span id="cartTotal">₹0</span></div>
      <button onclick="showOrderForm()">Checkout</button>
    </div>
  </div>
</div>

<!-- ORDER FORM -->
<div id="orderFormOverlay">
  <div class="order-form">
    <input id="phone" placeholder="Phone number">
    <input id="pincode" placeholder="Pincode">
    <input id="area" placeholder="Area">
    <input id="city" placeholder="City">
    <button onclick="placeOrder()">Place Order</button>
  </div>
</div>

<!-- THANKS -->
<div id="thanksPopup">Thanks for your order!</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

// 🔑 Put your Firebase config here
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_PROJECT_ID.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// Globals
const adminEmail = "youradmin@gmail.com";
let foods = [], cart = [], editingFoodId = null;

// --- AUTH ---
window.login = () => {
  const e = document.getElementById('email').value;
  const p = document.getElementById('password').value;
  if(!e||!p){ alert("Fill all fields"); return; }
  signInWithEmailAndPassword(auth,e,p).catch(err=>alert(err.message));
}
window.signup = () => {
  const e = document.getElementById('email').value;
  const p = document.getElementById('password').value;
  if(!e||!p){ alert("Fill all fields"); return; }
  createUserWithEmailAndPassword(auth,e,p).catch(err=>alert(err.message));
}
window.forgot = () => {
  const e = prompt("Enter your email for reset");
  if(e) sendPasswordResetEmail(auth,e).then(()=>alert("Reset email sent")).catch(err=>alert(err.message));
}
window.logout = () => { signOut(auth); }

// Auth State
onAuthStateChanged(auth,user=>{
  if(user){
    document.getElementById('loginPage').style.display="none";
    document.getElementById('menu').style.display="block";
    if(user.email===adminEmail) document.getElementById('adminMenu').style.display="flex";
    loadFoods();
  } else {
    document.getElementById('loginPage').style.display="flex";
    document.getElementById('menu').style.display="none";
    document.getElementById('adminMenu').style.display="none";
  }
});

// --- LOAD FOODS ---
async function loadFoods(){
  foods=[];
  const snap = await getDocs(collection(db,"foods"));
  snap.forEach(d=>{
    const data = d.data();
    if(!data.deleted) foods.push({id:d.id,...data});
  });
  renderFoods();
}

// --- RENDER FOODS ---
function renderFoods(){
  const container = document.getElementById('foodList'); container.innerHTML="";
  foods.forEach(f=>{
    const div = document.createElement('div'); div.className="food-card";
    div.innerHTML = `<div class="food-info">
      <h3>${f.name}</h3>
      <p>₹${f.price} - ⭐ ${f.rating}</p>
    </div>
    <div class="food-actions">
      <button class="minus-btn" onclick="updateCart('${f.id}',-1)">-</button>
      <span id="qty-${f.id}">0</span>
      <button class="add-btn" onclick="updateCart('${f.id}',1)">+</button>
    </div>
    ${auth.currentUser && auth.currentUser.email===adminEmail ? `
      <div class="admin-food-options">
        <i class="fas fa-pen" onclick="editFood('${f.id}')"></i>
        <i class="fas fa-trash" onclick="deleteFood('${f.id}')"></i>
      </div>`:""}
    `;
    container.appendChild(div);
  });
}

// --- CART ---
function updateCart(id, change){
  let item = cart.find(i=>i.id===id);
  if(item){ item.qty+=change; if(item.qty<0) item.qty=0;}
  else if(change>0) cart.push({id,qty:change});
  document.getElementById(`qty-${id}`).innerText = (cart.find(i=>i.id===id)||{qty:0}).qty;
  updateCartUI();
}
function updateCartUI(){
  const ci=document.getElementById('cartItems'); ci.innerHTML="";
  let total=0;
  cart.forEach(c=>{
    const f = foods.find(ff=>ff.id===c.id);
    if(f){ total+=f.price*c.qty;
      const div = document.createElement('div'); div.className="cart-item";
      div.innerHTML=`<span>${f.name} x ${c.qty}</span><span>₹${f.price*c.qty}</span>`;
      ci.appendChild(div);
    }
  });
  document.getElementById('cartTotal').innerText=`₹${total}`;
  document.getElementById('cartCount').innerText=cart.reduce((a,b)=>a+b.qty,0);
}
window.toggleCart = ()=>{ const cm=document.getElementById('cartModal'); cm.style.display=(cm.style.display==="flex")?"none":"flex"; }
window.showOrderForm = ()=>{ if(cart.length===0){ alert("Cart empty"); return;} document.getElementById('orderFormOverlay').style.display="flex"; }
window.placeOrder = async ()=>{
  const p=document.getElementById('phone').value;
  const pin=document.getElementById('pincode')?.value||"";
  const a=document.getElementById('area').value;
  const c=document.getElementById('city').value;
  if(!p||!a||!c){ alert("Fill all fields"); return; }
  await addDoc(collection(db,"orders"), {user:auth.currentUser.email, cart, phone:p, pin, area:a, city:c, timestamp:Date.now()});
  document.getElementById('orderFormOverlay').style.display="none";
  document.getElementById('cartModal').style.display="none";
  cart=[]; updateCartUI();
  document.getElementById('phone').value=""; document.getElementById('area').value=""; document.getElementById('city').value="";
  const popup=document.getElementById('thanksPopup'); popup.classList.add('show');
  setTimeout(()=>popup.classList.remove('show'),2000);
}

// --- ADMIN PANEL ---
window.openAdminPanel = ()=>{
  editingFoodId=null;
  document.getElementById('adminFormTitle').innerText="Add Food";
  document.getElementById('foodName').value="";
  document.getElementById('foodPrice').value="";
  document.getElementById('foodRating').value="";
  document.getElementById('adminPanel').style.display="flex";
}
window.closeAdminPanel=()=>{ document.getElementById('adminPanel').style.display="none"; }

window.submitFood = async ()=>{
  const name=document.getElementById('foodName').value;
  const price=Number(document.getElementById('foodPrice').value);
  const rating=Number(document.getElementById('foodRating').value);
  if(!name||!price||!rating){ alert("Fill all fields"); return; }
  if(editingFoodId){
    const foodRef=doc(db,"foods",editingFoodId);
    await updateDoc(foodRef,{name,price,rating});
    editingFoodId=null;
  } else {
    await addDoc(collection(db,"foods"),{name,price,rating});
  }
  closeAdminPanel();
  loadFoods();
}

window.editFood = (id)=>{
  const f = foods.find(ff=>ff.id===id);
  if(!f) return;
  editingFoodId=id;
  document.getElementById('adminFormTitle').innerText="Edit Food";
  document.getElementById('foodName').value=f.name;
  document.getElementById('foodPrice').value=f.price;
  document.getElementById('foodRating').value=f.rating;
  document.getElementById('adminPanel').style.display="flex";
}

window.deleteFood = async (id)=>{
  if(!confirm("Delete this food?")) return;
  const foodRef=doc(db,"foods",id);
  await updateDoc(foodRef,{deleted:true});
  loadFoods();
}

// --- SHOW ORDERS ---
window.showOrders = async ()=>{
  const snap=await getDocs(collection(db,"orders"));
  let html="<h3>Orders</h3>";
  snap.forEach(d=>{
    const o=d.data();
    html+=`<p><b>User:</b> ${o.user}<br><b>Cart:</b> ${JSON.stringify(o.cart)}<br>
           <b>Phone:</b> ${o.phone}<br><b>Area:</b> ${o.area}, ${o.city}<br>
           <hr></p>`;
  });
  const win=window.open("","Orders","width=600,height=600");
  win.document.write(html); win.document.close();
}
</script>
</body>
</html>
