<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ami Please Restaurant</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root {
    --primary: #ff4d4d;
    --primary-dark: #d63030;
    --secondary: #2d3436;
    --bg: #fafafa;
    --white: #fff;
    --radius: 12px;
    --transition: 0.3s;
}

/* GENERAL */
body { font-family: 'Poppins', sans-serif; margin:0; padding:0; background: var(--bg); }

/* LOGIN PAGE */
#loginPage { position:fixed; top:0; left:0; width:100%; height:100%;
    background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
                url("https://images.unsplash.com/photo-1504674900247-0877df9cc836") center/cover no-repeat;
    display:flex; align-items:center; justify-content:center; z-index:1000;
}
.loginBox { background: rgba(255,255,255,0.95); padding:40px; border-radius: var(--radius); width: 90%; max-width:400px; text-align:center; box-shadow: 0 8px 20px rgba(0,0,0,0.3);}
.loginBox h2 { font-family: 'Playfair Display', serif; color: var(--primary); margin-bottom:10px;}
.loginBox p { margin-bottom:20px; color:#666; }
.input-group { margin-bottom:15px; text-align:left; }
.input-group label { font-size:12px; margin-bottom:5px; display:block; color:#333; }
.input-group input { width:100%; padding:12px; border-radius: var(--radius); border:1px solid #ddd; outline:none; }
.btn { width:100%; padding:12px; border:none; border-radius: var(--radius); cursor:pointer; font-weight:600; margin-bottom:10px; }
.btn-primary { background: var(--primary); color:white; }
.btn-outline { background:transparent; border:2px solid var(--primary); color:var(--primary); }
.auth-toggle { font-size:14px; margin-top:10px; }
.auth-toggle a { color: var(--primary); cursor:pointer; text-decoration:none; }

/* MAIN PAGE */
#menu { display:none; padding-bottom:100px; }
header { display:flex; justify-content:space-between; align-items:center; padding:15px 20px; background:white; position:sticky; top:0; z-index:10; box-shadow:0 2px 8px rgba(0,0,0,0.1);}
.logo { font-family: 'Playfair Display', serif; font-size:22px; color:var(--primary);}
.cart-icon { position:relative; cursor:pointer; font-size:24px; color:var(--secondary);}
.cart-badge { position:absolute; top:-8px; right:-8px; background:var(--primary); color:white; font-size:12px; width:20px; height:20px; border-radius:50%; display:flex; align-items:center; justify-content:center; }

.banner { background: url("https://images.unsplash.com/photo-1555396273-367ea4eb4db5") center/cover; height:180px; display:flex; align-items:center; justify-content:center; color:white; font-family: 'Playfair Display', serif; font-size:28px; font-weight:600; text-shadow:0 2px 6px rgba(0,0,0,0.4); margin-bottom:20px; }

.container { max-width:1200px; margin:0 auto; padding:0 15px; display:grid; grid-template-columns: repeat(auto-fit,minmax(300px,1fr)); gap:15px; }
.food-card { background:white; padding:15px; border-radius:var(--radius); box-shadow:0 4px 15px rgba(0,0,0,0.08); position:relative; display:flex; flex-direction:column; }
.food-card img { width:100%; height:180px; object-fit:cover; border-radius:var(--radius);}
.food-info { margin-top:10px; }
.food-info h3 { margin:5px 0; font-size:18px; }
.food-info p { margin:0; color:var(--primary); font-weight:700; }
.food-actions { display:flex; justify-content:space-between; align-items:center; margin-top:10px; }
.add-btn, .minus-btn { background: var(--primary); color:white; border:none; border-radius:50%; width:35px; height:35px; cursor:pointer; font-size:20px; transition:var(--transition); }
.add-btn:hover, .minus-btn:hover { transform:scale(1.1); }

.admin-menu { display:none; margin-bottom:20px; justify-content:flex-end; gap:10px; }
.admin-menu button { padding:8px 15px; border:none; border-radius:var(--radius); cursor:pointer; font-weight:600; background:var(--primary); color:white; }

</style>
</head>
<body>

<!-- LOGIN PAGE -->
<div id="loginPage">
    <div class="loginBox">
        <h2>Ami Please</h2>
        <p>Order your favorite food</p>
        <div class="input-group"><label>Email</label><input id="email" type="email" placeholder="Enter your email"></div>
        <div class="input-group"><label>Password</label><input id="password" type="password" placeholder="Enter your password"></div>
        <button class="btn btn-primary" onclick="login()">Login</button>
        <button class="btn btn-outline" onclick="signup()">Signup</button>
        <div class="auth-toggle"><a onclick="forgot()">Forgot Password?</a></div>
    </div>
</div>

<!-- MAIN MENU -->
<div id="menu">
    <header>
        <div class="logo"><i class="fas fa-utensils"></i> Ami Please</div>
        <div>
            <span class="cart-icon" onclick="toggleCart()"><i class="fas fa-shopping-cart"></i><span id="cartCount" class="cart-badge">0</span></span>
            <button onclick="logout()" style="margin-left:10px;">Logout</button>
        </div>
    </header>
    <div class="banner">Delicious Food Delivered</div>

    <div class="admin-menu" id="adminMenu">
        <button onclick="showUploadPanel()">Upload Food</button>
        <button onclick="showOrders()">Orders</button>
    </div>

    <div class="container" id="foodList">
        <!-- Food cards injected here -->
    </div>
</div>
<!-- CART MODAL -->
<div id="cartModal">
    <div class="cart-panel">
        <div class="cart-header">
            <h3>Your Cart</h3>
            <span class="close-cart" onclick="toggleCart()">&times;</span>
        </div>
        <div id="cartItems" class="cart-items"></div>
        <div class="cart-footer">
            <div class="total-row"><span>Total:</span><span id="cartTotal">₹0</span></div>
            <button class="place-order-btn" onclick="showOrderForm()">Done</button>
        </div>
    </div>
</div>

<!-- ORDER FORM OVERLAY -->
<div id="orderFormOverlay">
    <div class="order-form">
        <input id="phone" placeholder="Phone number">
        <input id="pincode" placeholder="Pincode">
        <input id="area" placeholder="Area">
        <input id="city" placeholder="City">
        <input id="locationLink" placeholder="Current location link">
        <button class="place-order-btn" onclick="placeOrder()">Place Order</button>
    </div>
</div>

<!-- THANKS POPUP -->
<div id="thanksPopup">Thanks for visiting Ami Please!</div>

<!-- FOOD & CART SCRIPT -->
<script type="module">

// ----- INITIALIZE -----
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA1bN6g1EW62p-sDhZh6XsRe78fsJWSe9I",
  authDomain: "ami-please-restaurant.firebaseapp.com",
  projectId: "ami-please-restaurant",
  storageBucket: "ami-please-restaurant.firebasestorage.app",
  messagingSenderId: "590274660115",
  appId: "1:590274660115:web:998a7c8bb31e4a2696fce6",
  measurementId: "G-8FGXXT0Z8L"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ----- GLOBAL VARIABLES -----
const adminEmail = "beejumble43@gmail.com";
let cart = [];
let foods = [
    {id:1,name:"Burger",price:100,rating:4,img:""},
    {id:2,name:"Pizza",price:250,rating:5,img:""},
    {id:3,name:"Sandwich",price:150,rating:3,img:""},
    {id:4,name:"Pasta",price:200,rating:4,img:""},
    {id:5,name:"Sushi",price:350,rating:5,img:""}
];

// ----- AUTH FUNCTIONS -----
window.login = ()=> {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    if(!email||!password) return alert("Fill all fields");
    signInWithEmailAndPassword(auth,email,password).catch(e=>alert(e.message));
}

window.signup = ()=> {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    if(!email||!password) return alert("Fill all fields");
    createUserWithEmailAndPassword(auth,email,password).catch(e=>alert(e.message));
}

window.forgot = ()=>{
    const email = prompt("Enter your email");
    if(email) sendPasswordResetEmail(auth,email).then(()=>alert("Reset email sent")).catch(e=>alert(e.message));
}

window.logout = ()=>{
    signOut(auth).then(()=>console.log("Logged out")).catch(e=>alert(e.message));
}

// ----- AUTH STATE -----
onAuthStateChanged(auth,user=>{
    if(user){
        document.getElementById('loginPage').style.display="none";
        document.getElementById('menu').style.display="block";
        if(user.email===adminEmail) document.getElementById('adminMenu').style.display="flex";
        renderFoods();
    } else {
        document.getElementById('loginPage').style.display="flex";
        document.getElementById('menu').style.display="none";
        document.getElementById('adminMenu').style.display="none";
    }
});

// ----- RENDER FOODS -----
function renderFoods(){
    const foodList = document.getElementById('foodList');
    foodList.innerHTML="";
    foods.forEach(food=>{
        const div=document.createElement('div');
        div.className="food-card";
        div.innerHTML=`
            <img src="${food.img||'https://via.placeholder.com/300x180'}" alt="${food.name}">
            <div class="food-info">
                <h3>${food.name}</h3>
                <p>₹${food.price} - ⭐ ${food.rating}</p>
            </div>
            <div class="food-actions">
                <button class="minus-btn" onclick="updateCart(${food.id},-1)">-</button>
                <span id="qty-${food.id}">0</span>
                <button class="add-btn" onclick="updateCart(${food.id},1)">+</button>
            </div>
            ${auth.currentUser && auth.currentUser.email===adminEmail?`<div class="admin-food-options" onclick="editFood(${food.id})"><i class="fas fa-ellipsis-h"></i></div>`:""}
        `;
        foodList.appendChild(div);
    });
}

// ----- CART -----
function updateCart(id,change){
    const item = cart.find(i=>i.id===id);
    if(item){ item.qty+=change; if(item.qty<0)item.qty=0;}
    else if(change>0) cart.push({id,qty:change});
    document.getElementById(`qty-${id}`).innerText=(cart.find(i=>i.id===id)||{qty:0}).qty;
    updateCartUI();
}

function updateCartUI(){
    const cartItems = document.getElementById('cartItems');
    cartItems.innerHTML="";
    let total=0;
    cart.forEach(ci=>{
        const f = foods.find(f=>f.id===ci.id);
        total+=f.price*ci.qty;
        const div = document.createElement('div');
        div.className="cart-item";
        div.innerHTML=`<span>${f.name} x ${ci.qty}</span><span>₹${f.price*ci.qty}</span>`;
        cartItems.appendChild(div);
    });
    document.getElementById('cartTotal').innerText=`₹${total}`;
}

window.toggleCart = ()=>{
    const cm=document.getElementById('cartModal');
    cm.style.display = cm.style.display==="flex"?"none":"flex";
}

window.showOrderForm = ()=>{
    if(cart.length===0){ alert("Cart is empty"); return;}
    document.getElementById('orderFormOverlay').style.display="flex";
}

window.placeOrder = ()=>{
    const phone=document.getElementById('phone').value;
    const pin=document.getElementById('pincode').value;
    const area=document.getElementById('area').value;
    const city=document.getElementById('city').value;
    const loc=document.getElementById('locationLink').value;
    if(!phone || !pin || !area || !city || !loc){ alert("Fill all fields"); return;}
    
    // --- SEND ORDER TO FIRESTORE ---
    addDoc(collection(db,"orders"),{
        user: auth.currentUser.email,
        cart: cart,
        phone: phone,
        pincode: pin,
        area: area,
        city: city,
        location: loc,
        time: new Date()
    }).then(()=>console.log("Order placed")).catch(e=>alert(e.message));

    document.getElementById('orderFormOverlay').style.display="none";
    document.getElementById('cartModal').style.display="none";
    cart=[];
    updateCartUI();
    const popup=document.getElementById('thanksPopup');
    popup.classList.add('show');
    setTimeout(()=>{ popup.classList.remove('show'); },3000);
}
</script>
<!-- ADMIN UPLOAD & EDIT PANEL -->
<div id="adminPanelOverlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; z-index:50;">
    <div style="background:white; padding:20px; border-radius:12px; width:90%; max-width:400px; display:flex; flex-direction:column; gap:10px;">
        <h3 id="adminPanelTitle">Upload Food</h3>
        <input type="text" id="foodName" placeholder="Food Name">
        <input type="number" id="foodPrice" placeholder="Price">
        <input type="number" id="foodRating" placeholder="Rating (1-5)" min="1" max="5">
        <input type="file" id="foodImage">
        <button onclick="saveFood()" class="place-order-btn">Save</button>
        <button onclick="closeAdminPanel()" class="place-order-btn" style="background:#d63030;">Cancel</button>
    </div>
</div>

<script type="module">
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-storage.js";

// ----- ADMIN PANEL LOGIC -----
let editingFoodId = null;
const storage = getStorage(app);

window.showUploadPanel = ()=>{
    editingFoodId = null;
    document.getElementById('adminPanelTitle').innerText = "Upload Food";
    document.getElementById('foodName').value="";
    document.getElementById('foodPrice').value="";
    document.getElementById('foodRating').value="";
    document.getElementById('foodImage').value="";
    document.getElementById('adminPanelOverlay').style.display="flex";
}

window.editFood = (id)=>{
    editingFoodId = id;
    const f = foods.find(f=>f.id===id);
    document.getElementById('adminPanelTitle').innerText = "Edit Food";
    document.getElementById('foodName').value=f.name;
    document.getElementById('foodPrice').value=f.price;
    document.getElementById('foodRating').value=f.rating;
    document.getElementById('adminPanelOverlay').style.display="flex";
}

window.closeAdminPanel = ()=>{
    document.getElementById('adminPanelOverlay').style.display="none";
}

window.saveFood = async ()=>{
    const name = document.getElementById('foodName').value;
    const price = parseInt(document.getElementById('foodPrice').value);
    const rating = parseInt(document.getElementById('foodRating').value);
    const imageFile = document.getElementById('foodImage').files[0];

    if(!name || !price || !rating) return alert("Fill all fields");

    let imageUrl = "";
    if(imageFile){
        const storageRef = ref(storage, `foods/${Date.now()}_${imageFile.name}`);
        await uploadBytes(storageRef,imageFile);
        imageUrl = await getDownloadURL(storageRef);
    }

    if(editingFoodId){
        // Edit existing
        const idx = foods.findIndex(f=>f.id===editingFoodId);
        foods[idx] = {...foods[idx], name, price, rating, img: imageUrl||foods[idx].img};
    } else {
        // Add new
        const newId = foods.length ? foods[foods.length-1].id+1 : 1;
        foods.push({id:newId,name,price,rating,img:imageUrl});
    }

    renderFoods();
    closeAdminPanel();
}
</script>
