<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ami Please</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins;
margin:0;
background:#f5f5f5;
}

header{
display:flex;
gap:10px;
align-items:center;
background:white;
padding:10px;
position:sticky;
top:0;
z-index:10;
}

#menu{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
padding:10px;
}

.food{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
position:relative;
}

.food img{
width:100%;
height:140px;
object-fit:cover;
}

.foodInfo{
padding:10px;
}

.adminMenu{
position:absolute;
bottom:6px;
right:6px;
}

#cartButton{
background:#ff4d4d;
color:white;
border:none;
padding:8px 12px;
border-radius:6px;
}

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#0008;
display:none;
justify-content:center;
align-items:center;
}

.popupBox{
background:white;
padding:20px;
border-radius:10px;
width:300px;
max-height:80vh;
overflow:auto;
}

button{
cursor:pointer;
}

</style>
</head>

<body>

<header>

<h2 style="font-family:Playfair Display">Ami Please</h2>

<input id="search" placeholder="Search food">

<button id="cartButton" onclick="openCart()">🛒 <span id="cartCount">0</span></button>

<div id="adminButtons" style="display:none">
<button onclick="openUpload()">Upload Food</button>
<button onclick="openOrders()">Orders</button>
</div>

<button onclick="logout()">Logout</button>

</header>

<div id="menu"></div>

<!-- CART -->

<div id="cartPopup" class="popup">

<div class="popupBox">

<h3>Your Cart</h3>

<div id="cartItems"></div>

<h4>Total ₹ <span id="total">0</span></h4>

<button onclick="placeOrder()">Place Order</button>

<button onclick="closeCart()">Close</button>

</div>

</div>

<!-- UPLOAD -->

<div id="uploadPopup" class="popup">

<div class="popupBox">

<h3>Add / Edit Food</h3>

<input id="foodName" placeholder="Name"><br>
<input id="foodPrice" placeholder="Price"><br>
<input id="foodRating" placeholder="Rating"><br>
<input type="file" id="foodImage"><br>

<button onclick="saveFood()">Save</button>
<button onclick="closeUpload()">Cancel</button>

</div>

</div>

<!-- ORDERS -->

<div id="ordersPopup" class="popup">

<div class="popupBox">

<h3>Orders</h3>

<div id="orders"></div>

<button onclick="closeOrders()">Close</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js"
import { getAuth,onAuthStateChanged,signInWithEmailAndPassword,createUserWithEmailAndPassword,signOut } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js"
import { getFirestore,doc,setDoc,getDoc,collection,getDocs,addDoc,updateDoc,onSnapshot } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js"
import { getStorage,ref,uploadBytes,getDownloadURL } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-storage.js"

const firebaseConfig = {
apiKey: "AIzaSyA1bN6g1EW62p-sDhZh6XsRe78fsJWSe9I",
authDomain: "ami-please-restaurant.firebaseapp.com",
projectId: "ami-please-restaurant",
storageBucket: "ami-please-restaurant.appspot.com",
messagingSenderId: "590274660115",
appId: "1:590274660115:web:998a7c8bb31e4a2696fce6"
}

const app = initializeApp(firebaseConfig)
const auth = getAuth(app)
const db = getFirestore(app)
const storage = getStorage(app)

const adminEmail = "beejumble43@gmail.com"

let cart=[]

const foods=[
"Veg Burger","Chicken Burger","Cheese Burger","Veg Pizza","Chicken Pizza",
"Paneer Pizza","BBQ Pizza","Veg Fried Rice","Chicken Fried Rice",
"Egg Fried Rice","Chicken Biryani","Mutton Biryani","Veg Chowmein",
"Chicken Chowmein","Egg Chowmein","Veg Roll","Chicken Roll",
"Paneer Roll","French Fries","Cheese Fries","Peri Peri Fries",
"Coffee","Cold Coffee","Cappuccino","Latte","Mocha","Mojito",
"Lemon Soda"
]

async function loadFoods(){

menu.innerHTML=""

for(const name of foods){

let price="",rating="",image=""

const snap=await getDoc(doc(db,"foods",name))

if(snap.exists()){
const d=snap.data()
price=d.price
rating=d.rating
image=d.image
}

menu.innerHTML+=`

<div class="food">

<img src="${image||'https://via.placeholder.com/300'}">

<div class="foodInfo">

<h3>${name}</h3>

₹ ${price||"-"}

<br>

${"⭐".repeat(rating||0)}

<br>

<button onclick="addCart('${name}',${price||0})">Add</button>

</div>

${auth.currentUser.email===adminEmail?`

<div class="adminMenu">
<button onclick="editFood('${name}','${price}','${rating}')">⋮</button>
</div>

`:""}

</div>

`

}

}

window.addCart=(name,price)=>{

let item=cart.find(x=>x.name===name)

if(item)item.qty++
else cart.push({name,price,qty:1})

updateCart()

}

function updateCart(){

cartItems.innerHTML=""

let total=0,count=0

cart.forEach((i,index)=>{

total+=i.price*i.qty
count+=i.qty

cartItems.innerHTML+=`

<div>

${i.name}

<button onclick="dec(${index})">-</button>

${i.qty}

<button onclick="inc(${index})">+</button>

<button onclick="removeItem(${index})">❌</button>

</div>

`

})

document.getElementById("total").innerText=total
document.getElementById("cartCount").innerText=count

}

window.inc=i=>{cart[i].qty++;updateCart()}
window.dec=i=>{if(cart[i].qty>1)cart[i].qty--;else cart.splice(i,1);updateCart()}
window.removeItem=i=>{cart.splice(i,1);updateCart()}

window.openCart=()=>cartPopup.style.display="flex"
window.closeCart=()=>cartPopup.style.display="none"

window.placeOrder=async()=>{

await addDoc(collection(db,"orders"),{
email:auth.currentUser.email,
items:cart,
status:"Pending",
time:new Date().toLocaleString()
})

cart=[]
updateCart()
alert("Thanks for visiting Ami Please!")

}

window.openUpload=()=>uploadPopup.style.display="flex"
window.closeUpload=()=>uploadPopup.style.display="none"

window.editFood=(n,p,r)=>{
foodName.value=n
foodPrice.value=p
foodRating.value=r
openUpload()
}

window.saveFood=async()=>{

let name=foodName.value
let price=foodPrice.value
let rating=foodRating.value
let file=foodImage.files[0]

let image=""

if(file){
const storageRef=ref(storage,"foods/"+name)
await uploadBytes(storageRef,file)
image=await getDownloadURL(storageRef)
}else{
const snap=await getDoc(doc(db,"foods",name))
if(snap.exists()) image=snap.data().image
}

await setDoc(doc(db,"foods",name),{price,rating,image})

alert("Food saved")

closeUpload()

loadFoods()

}

window.openOrders=()=>{

ordersPopup.style.display="flex"

onSnapshot(collection(db,"orders"),snap=>{

orders.innerHTML=""

snap.forEach(d=>{

const o=d.data()

orders.innerHTML+=`

<div>

${o.email}

<br>

${o.items.map(i=>i.name+" x"+i.qty).join(",")}

<br>

Status: ${o.status}

<button onclick="updateStatus('${d.id}','Preparing')">Preparing</button>
<button onclick="updateStatus('${d.id}','Delivered')">Delivered</button>

</div>

`

})

})

}

window.closeOrders=()=>ordersPopup.style.display="none"

window.updateStatus=async(id,status)=>{
await updateDoc(doc(db,"orders",id),{status})
}

window.logout=()=>signOut(auth).then(()=>location.reload())

onAuthStateChanged(auth,user=>{

if(user){

if(user.email===adminEmail)
document.getElementById("adminButtons").style.display="block"

loadFoods()

}

})

search.oninput=()=>{

const t=search.value.toLowerCase()

document.querySelectorAll(".food").forEach(c=>{
c.style.display=c.innerText.toLowerCase().includes(t)?"block":"none"
})

}

</script>

</body>
</html>
