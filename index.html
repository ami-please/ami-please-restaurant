<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ami Please Restaurant</title>

<!-- Firebase SDKs -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-storage.js";

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyA1bN6g1EW62p-sDhZh6XsRe78fsJWSe9I",
  authDomain: "ami-please-restaurant.firebaseapp.com",
  projectId: "ami-please-restaurant",
  storageBucket: "ami-please-restaurant.firebasestorage.app",
  messagingSenderId: "590274660115",
  appId: "1:590274660115:web:998a7c8bb31e4a2696fce6",
  measurementId: "G-8FGXXT0Z8L"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

// DOM elements
const loginBtn = document.getElementById("loginBtn");
const logoutBtn = document.getElementById("logoutBtn");
const adminBtn = document.getElementById("adminBtn");
const foodGrid = document.getElementById("foodGrid");
const cartCount = document.getElementById("cartCount");
const cartSidebar = document.getElementById("cartSidebar");
const cartItemsDiv = document.getElementById("cartItems");
const cartTotalDiv = document.getElementById("cartTotal");
const checkoutBtn = document.getElementById("checkoutBtn");
const searchInput = document.getElementById("searchInput");
const categoryButtons = document.querySelectorAll(".category-btn");
const adminPanel = document.getElementById("adminPanel");
const adminFoodList = document.getElementById("adminFoodList");

// Cart state
let cart = [];
let allFoods = [];

// === AUTH ===
function showLogin() {
  const email = prompt("Enter admin email:");
  const password = prompt("Enter password:");
  if(email && password){
    signInWithEmailAndPassword(auth, email, password)
    .then(userCredential => alert("Logged in!"))
    .catch(err => alert(err.message));
  }
}

function logout() {
  signOut(auth).then(() => alert("Logged out!"));
}

onAuthStateChanged(auth, user => {
  if(user){
    loginBtn.style.display = "none";
    logoutBtn.style.display = "inline-block";
    adminBtn.style.display = "inline-block";
  } else {
    loginBtn.style.display = "inline-block";
    logoutBtn.style.display = "none";
    adminBtn.style.display = "none";
  }
});

// === ADMIN PANEL ===
function toggleAdmin() {
  adminPanel.classList.toggle("open");
  loadFoods();
}

// Add Food
async function addFood(e) {
  e.preventDefault();
  const name = document.getElementById("foodName").value;
  const category = document.getElementById("foodCategory").value;
  const price = parseFloat(document.getElementById("foodPrice").value);
  const file = document.getElementById("foodImage").files[0];

  if(!name || !category || !price || !file) return alert("Fill all fields!");

  const storageRef = ref(storage, "foods/" + file.name);
  await uploadBytes(storageRef, file);
  const imageUrl = await getDownloadURL(storageRef);

  await addDoc(collection(db, "foods"), {name, category, price, imageUrl});
  alert("Food added!");
  document.getElementById("addFoodForm").reset();
  loadFoods();
}

// Load all foods
async function loadFoods(){
  allFoods = [];
  foodGrid.innerHTML = "";
  adminFoodList.innerHTML = "";
  const snapshot = await getDocs(collection(db,"foods"));
  snapshot.forEach(docSnap => {
    const data = docSnap.data();
    const id = docSnap.id;
    allFoods.push({...data, id});
    createFoodCard(data,id);
    createAdminCard(data,id);
  });
}

// Food card
function createFoodCard(data,id){
  const card = document.createElement("div");
  card.classList.add("food-card");
  card.innerHTML = `
    <img src="${data.imageUrl}" alt="${data.name}" class="food-image" />
    <div class="food-info">
      <h3>${data.name}</h3>
      <p>₹${data.price.toFixed(2)}</p>
      <button onclick="addToCart('${id}','${data.name}',${data.price})">Add to Cart</button>
    </div>
  `;
  foodGrid.appendChild(card);
}

// Admin card
function createAdminCard(data,id){
  const div = document.createElement("div");
  div.classList.add("admin-food-card");
  div.innerHTML = `
    <p>${data.name} - ₹${data.price.toFixed(2)}</p>
    <button onclick="deleteFood('${id}')">Delete</button>
  `;
  adminFoodList.appendChild(div);
}

// Delete Food
async function deleteFood(id){
  await deleteDoc(doc(db,"foods",id));
  loadFoods();
}

// === CART SYSTEM ===
function addToCart(id,name,price){
  const index = cart.findIndex(item => item.id===id);
  if(index>-1) cart[index].qty +=1;
  else cart.push({id,name,price,qty:1});
  updateCartUI();
}

function updateCartUI(){
  cartItemsDiv.innerHTML = "";
  let total=0;
  cart.forEach(item=>{
    total+=item.price*item.qty;
    const div = document.createElement("div");
    div.innerHTML = `<p>${item.name} x ${item.qty} - ₹${(item.price*item.qty).toFixed(2)}</p>`;
    cartItemsDiv.appendChild(div);
  });
  cartTotalDiv.innerText = `₹${total.toFixed(2)}`;
  cartCount.innerText = cart.length;
  checkoutBtn.innerText = `Done (₹${total.toFixed(2)})`;
}

// Cart toggle
function toggleCart(){ cartSidebar.classList.toggle("open"); }

// Search filter
searchInput.addEventListener("input", ()=>{
  const q = searchInput.value.toLowerCase();
  const filtered = allFoods.filter(f=>f.name.toLowerCase().includes(q));
  foodGrid.innerHTML="";
  filtered.forEach(f=>createFoodCard(f,f.id));
});

// Category filter
categoryButtons.forEach(btn=>{
  btn.addEventListener("click",()=>{
    categoryButtons.forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    const cat = btn.dataset.category;
    const filtered = cat==="all"?allFoods: allFoods.filter(f=>f.category===cat);
    foodGrid.innerHTML="";
    filtered.forEach(f=>createFoodCard(f,f.id));
  });
});

// Initial load
loadFoods();
</script>

<style>
body{font-family:sans-serif;margin:0;padding:0;background:#f9f5f0;}
.header{position:fixed;top:0;width:100%;padding:1rem 2rem;background:#111;color:#fff;display:flex;justify-content:space-between;align-items:center;z-index:1000;}
.btn{padding:0.6rem 1.5rem;border:none;border-radius:50px;cursor:pointer;}
.btn-primary{background:#b8860b;color:#fff;}
.btn-secondary{background:#fff;color:#111;border:1px solid #b8860b;}
.food-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1rem;padding:6rem 2rem;}
.food-card{background:#fff;padding:1rem;border-radius:15px;box-shadow:0 5px 20px rgba(0,0,0,0.1);}
.food-card img{width:100%;border-radius:10px;}
.cart-sidebar{position:fixed;top:0;right:-300px;width:300px;height:100%;background:#fff;padding:1rem;box-shadow:-5px 0 20px rgba(0,0,0,0.2);transition:0.3s;overflow-y:auto;}
.cart-sidebar.open{right:0;}
.category-btn{padding:0.5rem 1rem;border:1px solid #b8860b;border-radius:50px;margin:0.3rem;cursor:pointer;}
.category-btn.active,.category-btn:hover{background:#b8860b;color:#fff;}
.admin-food-card{display:flex;justify-content:space-between;align-items:center;margin:0.5rem 0;}
</style>
</head>
<body>

<header class="header">
<div class="logo">Ami Please</div>
<div>
<button class="btn btn-primary" id="loginBtn" onclick="showLogin()">Login</button>
<button class="btn btn-secondary" id="logoutBtn" onclick="logout()" style="display:none;">Logout</button>
<button class="btn btn-secondary" id="adminBtn" onclick="toggleAdmin()" style="display:none;">Admin</button>
</div>
</header>

<main>
<div style="text-align:center;margin-top:6rem;">
<input type="text" id="searchInput" placeholder="Search dishes..." style="padding:0.5rem 1rem;border-radius:50px;border:1px solid #b8860b;">
<div style="margin:1rem 0;">
<button class="category-btn active" data-category="all">All</button>
<button class="category-btn" data-category="starter">Starters</button>
<button class="category-btn" data-category="main">Mains</button>
<button class="category-btn" data-category="dessert">Desserts</button>
</div>
</div>
<div class="food-grid" id="foodGrid"></div>
</main>

<div class="cart-sidebar" id="cartSidebar">
<h2>Cart</h2>
<div id="cartItems"></div>
<div id="cartTotal">₹0.00</div>
<button class="btn btn-primary" id="checkoutBtn" onclick="alert('Order placed!')">Done</button>
</div>

<!-- Admin Panel -->
<div id="adminPanel" style="position:fixed;top:0;right:0;width:400px;height:100%;background:#fff;box-shadow:-5px 0 20px rgba(0,0,0,0.2);padding:2rem;display:none;overflow-y:auto;">
<h2>Admin Panel</h2>
<form id="addFoodForm" onsubmit="addFood(event)">
<input type="text" id="foodName" placeholder="Food Name" required><br><br>
<select id="foodCategory" required>
<option value="main">Main</option>
<option value="starter">Starter</option>
<option value="dessert">Dessert</option>
</select><br><br>
<input type="number" id="foodPrice" placeholder="Price" required><br><br>
<input type="file" id="foodImage" required><br><br>
<button class="btn btn-primary" type="submit">Add Food</button>
</form>
<div id="adminFoodList"></div>
</div>

</body>
</html>
