<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ami Please Restaurant</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#f2f2f2;
display:flex;
justify-content:center;
}

#app{
width:100%;
max-width:420px;
background:white;
min-height:100vh;
}

header{
background:#1d3557;
color:white;
padding:14px;
display:flex;
justify-content:space-between;
align-items:center;
}

.header-right{
display:flex;
align-items:center;
gap:8px;
}

#ordersIcon{
font-size:20px;
cursor:pointer;
display:none;
}

#logoutBtn{
background:#e63946;
border:none;
color:white;
padding:6px 10px;
border-radius:6px;
}

.banner{
background:linear-gradient(120deg,#1d3557,#457b9d);
color:white;
padding:25px 15px;
font-size:24px;
font-weight:bold;
letter-spacing:1px;
text-align:center;
}

.banner span{
font-size:14px;
display:block;
opacity:0.9;
}

.food-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
padding:10px;
}

.food-card{
background:white;
padding:12px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
text-align:center;
}

button{
padding:8px;
border:none;
border-radius:8px;
background:#457b9d;
color:white;
margin:3px;
}

input{
width:100%;
padding:8px;
margin-bottom:6px;
border-radius:6px;
border:1px solid #ccc;
}

#cartButton{
position:fixed;
bottom:15px;
right:15px;
width:60px;
height:60px;
background:#e63946;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
color:white;
}

#cartPanel{
position:fixed;
bottom:0;
width:100%;
max-width:420px;
background:white;
padding:12px;
display:none;
box-shadow:0 -3px 10px rgba(0,0,0,0.2);
}

#orderOverlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
justify-content:center;
align-items:center;
}

.orderBox{
background:white;
padding:20px;
border-radius:12px;
width:90%;
max-width:350px;
}

#loginPage{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#1d3557;
display:flex;
justify-content:center;
align-items:center;
}

.loginBox{
background:white;
padding:20px;
border-radius:10px;
width:80%;
max-width:300px;
}

.addAnimation{
animation:pop 0.3s;
}

@keyframes pop{
0%{transform:scale(1)}
50%{transform:scale(1.2)}
100%{transform:scale(1)}
}

#adminPanel{
display:none;
padding:10px;
background:#fafafa;
border-top:1px solid #eee;
}

</style>
</head>

<body>

<div id="app">

<header>

<div>Cart: <span id="cartCount">0</span></div>

<div class="header-right">
<div id="ordersIcon">📦</div>
<button id="logoutBtn">Logout</button>
</div>

</header>

<div class="banner">
Ami Please Restaurant
<span>Fresh • Fast • Delicious</span>
</div>

<div class="food-grid" id="foodList"></div>

<div id="adminPanel">

<h3>Food Panel</h3>

<input id="foodName" placeholder="Food name">
<input id="foodPrice" placeholder="Price">
<input id="foodRating" placeholder="Rating">

<button id="addFoodBtn">Add Food</button>

<hr>

<h3>Orders</h3>
<div id="adminOrders"></div>

</div>

</div>

<div id="cartButton">🛒</div>

<div id="cartPanel">
<h3>Your Cart</h3>
<div id="cartItems"></div>
<button id="doneCartBtn">Done</button>
</div>

<div id="orderOverlay">
<div class="orderBox">
<h3>Delivery Details</h3>

<input id="phone" placeholder="Phone">
<input id="area" placeholder="Area">
<input id="city" placeholder="City">
<input id="pincode" placeholder="Pincode">
<input id="locationLink" placeholder="Location link">

<button id="getLocationBtn">Get Location</button>
<button id="confirmOrderBtn">Confirm Order</button>

</div>
</div>

<div id="loginPage">
<div class="loginBox">

<h3>Login</h3>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button id="loginBtn">Login</button>
<button id="signupBtn">Signup</button>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword,
createUserWithEmailAndPassword,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
updateDoc,
doc,
onSnapshot,
serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyA1bN6g1EW62p-sDhZh6XsRe78fsJWSe9I",
authDomain:"ami-please-restaurant.firebaseapp.com",
projectId:"ami-please-restaurant",
storageBucket:"ami-please-restaurant.appspot.com",
messagingSenderId:"590274660115",
appId:"1:590274660115:web:998a7c8bb31e4a2696fce6"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);

const adminEmail="beejumble43@gmail.com";

let cart=[];

async function loadFoods(){

foodList.innerHTML="";

const snap=await getDocs(collection(db,"foods"));

snap.forEach(d=>{

const f=d.data();

const div=document.createElement("div");
div.className="food-card";

div.innerHTML=`
<h4>${f.name}</h4>
<p>₹${f.price}</p>
<p>⭐ ${f.rating}</p>
<button onclick="addCart('${f.name}',${f.price})">Add</button>
`;

if(auth.currentUser && auth.currentUser.email===adminEmail){

div.innerHTML+=`
<br>
<button onclick="editFood('${d.id}','${f.name}',${f.price},'${f.rating}')">Edit</button>
<button onclick="deleteFood('${d.id}')">Delete</button>
`;

}

foodList.appendChild(div);

});

}

window.addCart=(name,price)=>{

cart.push({name,price});

cartCount.innerText=cart.length;

cartButton.classList.add("addAnimation");
setTimeout(()=>cartButton.classList.remove("addAnimation"),300);

renderCart();

};

function renderCart(){

cartItems.innerHTML="";

cart.forEach(c=>{

const div=document.createElement("div");
div.innerText=c.name+" ₹"+c.price;

cartItems.appendChild(div);

});

}

cartButton.onclick=()=>cartPanel.style.display="block";

doneCartBtn.onclick=()=>{

if(cart.length===0){
alert("Cart empty");
return;
}

orderOverlay.style.display="flex";

};

confirmOrderBtn.onclick=async()=>{

await addDoc(collection(db,"orders"),{

user:auth.currentUser.email,
cart:cart,
phone:phone.value,
area:area.value,
city:city.value,
pincode:pincode.value,
location:locationLink.value,
status:"pending",
time:serverTimestamp()

});

alert("Order placed");

cart=[];
cartCount.innerText=0;
renderCart();

orderOverlay.style.display="none";
cartPanel.style.display="none";

};

addFoodBtn.onclick=async()=>{

await addDoc(collection(db,"foods"),{

name:foodName.value,
price:foodPrice.value,
rating:foodRating.value

});

loadFoods();

};

window.deleteFood=async(id)=>{

await deleteDoc(doc(db,"foods",id));
loadFoods();

};

window.editFood=async(id,name,price,rating)=>{

const newName=prompt("Food name",name);
const newPrice=prompt("Price",price);
const newRating=prompt("Rating",rating);

await updateDoc(doc(db,"foods",id),{
name:newName,
price:newPrice,
rating:newRating
});

loadFoods();

};

loginBtn.onclick=()=>signInWithEmailAndPassword(auth,email.value,password.value);
signupBtn.onclick=()=>createUserWithEmailAndPassword(auth,email.value,password.value);

logoutBtn.onclick=()=>signOut(auth);

ordersIcon.onclick=()=>{

adminPanel.style.display=
adminPanel.style.display==="none"?"block":"none";

loadOrders();

};

async function loadOrders(){

adminOrders.innerHTML="";

const snap=await getDocs(collection(db,"orders"));

snap.forEach(d=>{

const o=d.data();

const div=document.createElement("div");

div.innerHTML=`

<hr>

<b>${o.user}</b><br>

${o.area}, ${o.city}<br>

Phone: ${o.phone}<br>

<a href="${o.location}" target="_blank">Location</a><br>

Status: ${o.status}<br>

<button onclick="updateStatus('${d.id}','preparing')">Preparing</button>
<button onclick="updateStatus('${d.id}','delivered')">Delivered</button>

`;

adminOrders.appendChild(div);

});

}

window.updateStatus=async(id,status)=>{

await updateDoc(doc(db,"orders",id),{status});

};

onAuthStateChanged(auth,user=>{

if(user){

loginPage.style.display="none";

loadFoods();

if(user.email===adminEmail){

ordersIcon.style.display="block";
adminPanel.style.display="none";

listenOrders();

}

}else{

loginPage.style.display="flex";

}

});

function listenOrders(){

onSnapshot(collection(db,"orders"),snap=>{

alert("🔔 New Order Received!");

});

}

getLocationBtn.onclick=()=>{

navigator.geolocation.getCurrentPosition(p=>{

locationLink.value=`https://maps.google.com/?q=${p.coords.latitude},${p.coords.longitude}`;

});

};

</script>

</body>
</html>
