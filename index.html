<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ami Please Restaurant</title><!-- Firebase SDKs --><script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js';
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js';
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, onSnapshot, serverTimestamp } from 'https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js';
import { getStorage, ref, uploadBytes, getDownloadURL } from 'https://www.gstatic.com/firebasejs/12.10.0/firebase-storage.js';

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyA1bN6g1EW62p-sDhZh6XsRe78fsJWSe9I",
  authDomain: "ami-please-restaurant.firebaseapp.com",
  projectId: "ami-please-restaurant",
  storageBucket: "ami-please-restaurant.firebasestorage.app",
  messagingSenderId: "590274660115",
  appId: "1:590274660115:web:998a7c8bb31e4a2696fce6",
  measurementId: "G-8FGXXT0Z8L"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

// Global variables
let currentUser = null;
let cart = [];
let foods = [];

// DOM Elements
const loginBtn = document.getElementById('loginBtn');
const logoutBtn = document.getElementById('logoutBtn');
const adminBtn = document.getElementById('adminBtn');
const foodGrid = document.getElementById('foodGrid');
const cartSidebar = document.getElementById('cartSidebar');
const cartItems = document.getElementById('cartItems');
const cartTotal = document.getElementById('cartTotal');
const checkoutBtn = document.getElementById('checkoutBtn');
const orderOverlay = document.getElementById('orderOverlay');
const successPopup = document.getElementById('successPopup');
const adminPanel = document.getElementById('adminPanel');

// ----------------- Authentication -----------------
onAuthStateChanged(auth, user => {
    if(user){
        currentUser = user;
        loginBtn.style.display = 'none';
        logoutBtn.style.display = 'inline-block';
        checkAdmin(user.uid);
    } else {
        currentUser = null;
        loginBtn.style.display = 'inline-block';
        logoutBtn.style.display = 'none';
        adminBtn.style.display = 'none';
    }
});

async function checkAdmin(uid){
    // Example admin uid check (replace with Firestore admin collection if needed)
    const adminUids = ['your_admin_uid_here'];
    if(adminUids.includes(uid)){
        adminBtn.style.display = 'inline-block';
    }
}

function showLogin(){
    const email = prompt('Enter Email');
    const password = prompt('Enter Password');
    signInWithEmailAndPassword(auth, email, password).catch(err=>alert(err.message));
}

function logout(){
    signOut(auth);
}

function toggleAdmin(){
    if(adminPanel.classList.contains('open')) adminPanel.classList.remove('open');
    else adminPanel.classList.add('open');
}

// ----------------- Food Management -----------------
// Pre-listed foods (admin can add images later)
foods = [
  {id: 'f1', name: 'Cheese Burger', price: 150, category: 'main', rating: 4, img: ''},
  {id: 'f2', name: 'Veg Pizza', price: 250, category: 'main', rating: 5, img: ''},
  {id: 'f3', name: 'Paneer Tikka', price: 180, category: 'starter', rating: 4, img: ''},
  {id: 'f4', name: 'Chocolate Lava Cake', price: 120, category: 'dessert', rating: 5, img: ''},
  // Add more foods up to 50+
];

function renderFoods(){
    foodGrid.innerHTML = '';
    foods.forEach(food => {
        const card = document.createElement('div');
        card.className = 'food-card';
        card.innerHTML = `
            <div class='food-image'>${food.img ? `<img src='${food.img}' style='width:100%;height:100%;object-fit:cover;'>` : food.name}</div>
            <div class='food-info'>
                <div class='food-name'>${food.name}</div>
                <div class='food-price'>₹${food.price}</div>
                <div class='stars'>${'★'.repeat(food.rating)}</div>
                <div class='quantity-controls'>
                    <button class='qty-btn' onclick='decreaseQty("${food.id}")'>-</button>
                    <div class='quantity' id='qty-${food.id}'>0</div>
                    <button class='qty-btn' onclick='increaseQty("${food.id}")'>+</button>
                </div>
                <button class='add-to-cart' onclick='addToCart("${food.id}")'>Add to Cart</button>
            </div>
            <div class='admin-dots' onclick='editFoodPrompt("${food.id}")'>⋮</div>
        `;
        if(currentUser && adminBtn.style.display=='inline-block') card.querySelector('.admin-dots').style.display='flex';
        foodGrid.appendChild(card);
    });
}

function increaseQty(id){
    const el = document.getElementById('qty-'+id);
    el.textContent = parseInt(el.textContent)+1;
}
function decreaseQty(id){
    const el = document.getElementById('qty-'+id);
    if(parseInt(el.textContent)>0) el.textContent = parseInt(el.textContent)-1;
}

function addToCart(id){
    const qty = parseInt(document.getElementById('qty-'+id).textContent);
    if(qty<=0) return;
    const existing = cart.find(c=>c.id===id);
    if(existing) existing.qty += qty;
    else cart.push({id:id, qty:qty});
    updateCartUI();
    document.getElementById('qty-'+id).textContent='0';
}

function updateCartUI(){
    cartItems.innerHTML='';
    let total=0;
    cart.forEach(item=>{
        const food = foods.find(f=>f.id===item.id);
        total += food.price*item.qty;
        const div = document.createElement('div');
        div.className='cart-item';
        div.innerHTML=`
            <img src='${food.img || ""}' alt='${food.name}'>
            <div class='cart-item-info'>
                <h4>${food.name}</h4>
                <div class='price'>₹${food.price} x ${item.qty}</div>
            </div>
        `;
        cartItems.appendChild(div);
    });
    cartTotal.textContent='₹'+total;
    checkoutBtn.textContent=`Done (₹${total})`;
}

function toggleCart(){
    cartSidebar.classList.toggle('open');
}

function showOrderOverlay(){
    if(cart.length==0){ alert('Add items to cart first!'); return; }
    orderOverlay.style.display='flex';
}

function placeOrder(){
    const phone=document.getElementById('phone').value;
    const pincode=document.getElementById('pincode').value;
    const area=document.getElementById('area').value;
    const city=document.getElementById('city').value;
    if(!phone||!pincode||!area||!city){ alert('Fill all fields'); return; }
    const order={items:cart, phone, pincode, area, city, timestamp:serverTimestamp()};
    addDoc(collection(db,'orders'),order).then(()=>{
        orderOverlay.style.display='none';
        cart=[];
        updateCartUI();
        showSuccess('Thanks for visiting Ami!');
    }).catch(err=>alert(err.message));
}

function showSuccess(msg){
    successPopup.textContent=msg;
    successPopup.style.display='block';
    setTimeout(()=>{successPopup.style.display='none';},2000);
}

function editFoodPrompt(id){
    if(!currentUser || adminBtn.style.display=='none') return;
    const food = foods.find(f=>f.id===id);
    const newName = prompt('Food Name', food.name);
    const newPrice = prompt('Price', food.price);
    const newRating = prompt('Rating (1-5)', food.rating);
    // Image upload simplified
    food.name=newName; food.price=parseInt(newPrice); food.rating=parseInt(newRating);
    renderFoods();
}

renderFoods();
</script><style>
/* minimal additional styling for success popup */
#successPopup{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#27AE60;color:white;padding:2rem;border-radius:20px;font-size:1.5rem;z-index:3000;text-align:center;}
</style></head>
<body><!-- Header --><header class="header">
<div class="logo">Ami Please</div>
<div class="header-actions">
<button class="btn btn-primary" id="loginBtn" onclick="showLogin()">Login</button>
<button class="btn btn-secondary" id="logoutBtn" onclick="logout()" style="display:none;">Logout</button>
<button class="btn btn-secondary" id="adminBtn" onclick="toggleAdmin()" style="display:none;">Admin</button>
<div class="cart-btn" onclick="toggleCart()">🛒 <span class="cart-count" id="cartCount">0</span></div>
</div>
</header><!-- Food Grid --><main style="padding:5rem;">
<div class="food-grid" id="foodGrid"></div>
</main><!-- Cart Sidebar --><div class="cart-sidebar" id="cartSidebar">
<div class="cart-header"><h2>Cart</h2><button class="close-cart" onclick="toggleCart()">×</button></div>
<div id="cartItems"></div>
<div class="cart-total" id="cartTotal">₹0</div>
<button class="btn btn-primary" onclick="showOrderOverlay()" id="checkoutBtn" style="width:100%;">Done (₹0)</button>
</div><!-- Order Overlay --><div class="order-overlay" id="orderOverlay">
<div class="order-form">
<h2 style="text-align:center; margin-bottom:1rem;">Complete Your Order</h2>
<div class="form-group"><label>Phone</label><input type="tel" id="phone"></div>
<div class="form-group"><label>Pincode</label><input type="text" id="pincode"></div>
<div class="form-group"><label>Area</label><input type="text" id="area"></div>
<div class="form-group"><label>City</label><input type="text" id="city"></div>
<button class="btn btn-primary" onclick="placeOrder()" style="width:100%; margin-top:1rem;">Place Order</button>
</div>
</div><!-- Success Popup --><div id="successPopup"></div><!-- Admin Panel --><div class="admin-panel" id="adminPanel">
<h2>Admin Panel</h2>
<p>Manage foods, orders, upload images, edit/delete foods here.</p>
</div></body>
    </html>
