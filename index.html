<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ami Please Restaurant</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyA1bN6g1EW62p-sDhZh6XsRe78fsJWSe9I",
  authDomain: "ami-please-restaurant.firebaseapp.com",
  projectId: "ami-please-restaurant",
  storageBucket: "ami-please-restaurant.appspot.com",
  messagingSenderId: "590274660115",
  appId: "1:590274660115:web:998a7c8bb31e4a2696fce6",
  measurementId: "G-8FGXXT0Z8L"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
window.auth = auth; // expose auth for global use
</script>

<style>
body { font-family: 'Poppins', sans-serif; margin:0; background:#f4f4f4; }
header { background:#c9a227; color:white; padding:15px; text-align:center; font-size:1.5em; font-weight:600; }
#loginContainer { display:flex; justify-content:center; align-items:center; height:100vh; background:#1a1a2e; }
.loginBox { background:#16213e; padding:30px; border-radius:12px; color:white; width:300px; animation:fadeIn 0.5s; }
.loginBox h2 { text-align:center; margin-bottom:20px; font-family:'Playfair Display', serif; }
.loginBox input { width:100%; padding:10px; margin:5px 0; border-radius:6px; border:none; }
.loginBox button { width:100%; padding:12px; margin-top:10px; background:#c9a227; border:none; border-radius:8px; font-weight:600; cursor:pointer; }
.loginBox button:hover { background:#a6851e; }
.loginBox .link { font-size:0.85em; color:#c9a227; cursor:pointer; text-align:center; display:block; margin-top:5px; }
#mainContent { display:none; padding:20px; max-width:1200px; margin:auto; }
#searchInput { width:100%; padding:12px; margin-bottom:20px; border-radius:8px; border:1px solid #ccc; }
.menu-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:20px; }
.food-card { background:white; border-radius:12px; padding:10px; text-align:center; box-shadow:0 5px 15px rgba(0,0,0,0.1); position:relative; }
.food-card img { width:100%; height:120px; object-fit:cover; border-radius:8px; }
.food-card button { margin-top:10px; padding:8px 12px; border:none; border-radius:8px; background:#c9a227; cursor:pointer; color:white; }
.food-card button:hover { background:#a6851e; }
#cartBtn { position:fixed; bottom:20px; right:20px; padding:15px 20px; background:#e94560; color:white; border:none; border-radius:50px; cursor:pointer; z-index:1000; display:flex; gap:10px; align-items:center; }
#cartSidebar { position:fixed; top:0; right:-400px; width:350px; height:100%; background:white; box-shadow:-5px 0 20px rgba(0,0,0,0.2); transition:0.3s; padding:20px; z-index:999; overflow-y:auto; }
#cartSidebar.active { right:0; }
#cartSidebar h3 { margin-top:0; }
.cart-item { display:flex; justify-content:space-between; margin-bottom:10px; }
.cart-item span { display:block; }
#doneCart { background:#c9a227; color:white; padding:10px; border:none; width:100%; margin-top:10px; border-radius:8px; cursor:pointer; }
#doneCart:hover { background:#a6851e; }
#overlayMsg { position:fixed; top:20px; left:50%; transform:translateX(-50%); background:#c9a227; color:white; padding:10px 20px; border-radius:50px; display:none; z-index:1001; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
</style>
</head>

<body>

<header>Ami Please Restaurant</header>

<!-- Login -->
<div id="loginContainer">
  <div class="loginBox">
    <h2>Login / Signup</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <button onclick="signup()">Sign Up</button>
    <span class="link" onclick="forgetPassword()">Forget Password?</span>
  </div>
</div>

<!-- Main content -->
<div id="mainContent">
  <input type="text" id="searchInput" placeholder="Search for food...">
  <div class="menu-grid" id="menuGrid"></div>
</div>

<!-- Cart -->
<button id="cartBtn" onclick="toggleCart()">Cart (<span id="cartCount">0</span>)</button>
<div id="cartSidebar">
  <h3>Your Cart</h3>
  <div id="cartItems"></div>
  <button id="doneCart" onclick="doneCart()">Done</button>
</div>

<div id="overlayMsg"></div>

<script>
// --- Firebase Auth Functions ---
const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");
const loginContainer = document.getElementById("loginContainer");
const mainContent = document.getElementById("mainContent");

function signup(){
  createUserWithEmailAndPassword(auth,emailInput.value,passwordInput.value)
  .then(user=>{alert("Account created!"); showMain();})
  .catch(err=>alert(err.message));
}

function login(){
  signInWithEmailAndPassword(auth,emailInput.value,passwordInput.value)
  .then(user=>{alert("Logged in!"); showMain();})
  .catch(err=>alert(err.message));
}

function forgetPassword(){
  if(!emailInput.value){alert("Enter email"); return;}
  sendPasswordResetEmail(auth,emailInput.value)
  .then(()=>alert("Reset email sent!"))
  .catch(err=>alert(err.message));
}

function showMain(){
  loginContainer.style.display="none";
  mainContent.style.display="block";
}

// --- Menu & Cart ---
const foods = [
  ["Momos", 120], ["Steamed Momos", 130], ["Fried Momos", 140],
  ["Pizza", 400], ["Cheese Pizza", 450], ["Veg Pizza", 420],
  ["Chicken Roll", 150], ["Veg Roll", 130],
  ["Burger", 200], ["Cheese Burger", 250], ["Veg Burger", 220],
  ["French Fries", 100], ["Sandwich", 180], ["Paneer Tikka", 220],
  ["Pasta", 250], ["Garlic Bread", 120], ["Coke", 40], ["Pepsi", 40],
  ["Ice Cream", 80], ["Chocolate Cake", 150], ["Coffee", 90], ["Tea", 50],
  ["Chicken Wings", 300], ["Spring Roll", 180], ["Salad", 120], ["Soup", 100],
  ["Veg Thali", 250], ["Chicken Thali", 300], ["Paneer Butter Masala", 280],
  ["Naan", 30], ["Roti", 20], ["Rice", 50], ["Samosa", 25], ["Pakora", 40],
  ["Biryani", 350], ["Chicken Biryani", 400], ["Veg Biryani", 380],
  ["Shawarma", 200], ["Falafel", 180], ["Juice", 60], ["Mango Shake", 90],
  ["Milkshake", 100], ["Cold Coffee", 120], ["Choco Lava Cake", 180],
  ["Brownie", 150], ["Lassi", 80], ["Dosa", 120], ["Idli", 50], ["Vada", 40],
  ["Upma", 60], ["Pav Bhaji", 150], ["Pani Puri", 80]
];

let cart = [];

function renderMenu(){
  const menuGrid = document.getElementById("menuGrid");
  menuGrid.innerHTML="";
  foods.forEach(f=>{
    menuGrid.innerHTML+=`
      <div class="food-card">
        <img src="https://picsum.photos/200?random=${Math.random()}" alt="${f[0]}">
        <h4>${f[0]}</h4>
        <p>₹${f[1]}</p>
        <button onclick="addToCart('${f[0]}',${f[1]})">Add +</button>
      </div>
    `;
  });
}

function addToCart(name,price){
  cart.push({name,price});
  updateCart();
  showOverlay(`${name} added!`);
}

function updateCart(){
  document.getElementById("cartCount").innerText = cart.length;
  const itemsDiv = document.getElementById("cartItems");
  itemsDiv.innerHTML="";
  cart.forEach((c,i)=>{
    itemsDiv.innerHTML+=`
      <div class="cart-item">
        <span>${c.name}</span><span>₹${c.price}</span>
      </div>
    `;
  });
}

function toggleCart(){
  document.getElementById("cartSidebar").classList.toggle("active");
}

function doneCart(){
  alert("Order placed successfully!");
  cart=[];
  updateCart();
  toggleCart();
}

function showOverlay(msg){
  const overlay = document.getElementById("overlayMsg");
  overlay.innerText=msg;
  overlay.style.display="block";
  setTimeout(()=>overlay.style.display="none",1000);
}

// --- Search ---
document.getElementById("searchInput").addEventListener("input", function(){
  let val = this.value.toLowerCase();
  const menuGrid = document.getElementById("menuGrid");
  menuGrid.innerHTML="";
  foods.filter(f=>f[0].toLowerCase().includes(val))
       .forEach(f=>{
         menuGrid.innerHTML+=`
         <div class="food-card">
           <img src="https://picsum.photos/200?random=${Math.random()}" alt="${f[0]}">
           <h4>${f[0]}</h4>
           <p>₹${f[1]}</p>
           <button onclick="addToCart('${f[0]}',${f[1]})">Add +</button>
         </div>
         `;
       });
});

// Initial render
renderMenu();
</script>

</body>
      </html>
