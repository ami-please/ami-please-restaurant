<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Ami Please Cafe & Restaurant</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins;
margin:0;
background:#f6f6f6;
}

/* HEADER */

header{
background:#111;
color:white;
padding:18px;
font-size:22px;
font-weight:700;
}

/* HERO */

.hero{
height:260px;
background:url("https://images.unsplash.com/photo-1504674900247-0877df9cc836?q=80&w=1400&auto=format&fit=crop");
background-size:cover;
background-position:center;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:34px;
font-weight:700;
text-shadow:0 4px 20px rgba(0,0,0,0.6);
}

/* SEARCH */

.search{
padding:15px;
}

.search input{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ddd;
}

/* CATEGORY */

.categories{
display:flex;
gap:10px;
overflow:auto;
padding:10px;
}

.cat{
background:white;
padding:8px 14px;
border-radius:20px;
cursor:pointer;
box-shadow:0 3px 10px rgba(0,0,0,.1);
}

/* MENU */

#menu{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:16px;
padding:16px;
}

.food{
background:white;
border-radius:14px;
overflow:hidden;
box-shadow:0 6px 20px rgba(0,0,0,.08);
}

.food img{
width:100%;
height:150px;
object-fit:cover;
}

.info{
padding:10px;
}

.name{
font-weight:600;
}

.rating{
color:gold;
font-size:13px;
}

.price{
color:#ff5200;
font-weight:700;
}

.qty{
display:flex;
gap:8px;
margin-top:5px;
}

.qty button{
background:#ff5200;
color:white;
border:none;
width:26px;
height:26px;
border-radius:4px;
}

/* CART BUTTON */

.cartBtn{
position:fixed;
bottom:25px;
right:25px;
background:black;
color:white;
padding:15px 18px;
border-radius:40px;
font-weight:600;
cursor:pointer;
}

/* CART PANEL */

.cart{
position:fixed;
top:0;
right:-100%;
width:100%;
max-width:420px;
height:100%;
background:white;
transition:.3s;
box-shadow:-10px 0 30px rgba(0,0,0,.25);
padding:20px;
overflow:auto;
}

.cart.active{
right:0;
}

.cart-item{
display:flex;
justify-content:space-between;
margin-bottom:10px;
}

.total{
font-size:18px;
font-weight:700;
}

.done{
background:#ff5200;
color:white;
border:none;
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
}

input{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:6px;
border:1px solid #ddd;
}

.location{
width:100%;
padding:10px;
border:none;
background:#eee;
margin-bottom:10px;
border-radius:6px;
}

.order{
width:100%;
padding:12px;
background:#25D366;
color:white;
border:none;
border-radius:8px;
font-weight:600;
}

</style>
</head>

<body>

<header>Ami Please Cafe & Restaurant</header>

<div class="hero">
Delicious Food
</div>

<div class="search">
<input id="search" placeholder="Search food..." onkeyup="render()">
</div>

<div class="categories">
<div class="cat" onclick="cat='all';render()">All</div>
<div class="cat" onclick="cat='burger';render()">Burger</div>
<div class="cat" onclick="cat='pizza';render()">Pizza</div>
<div class="cat" onclick="cat='biryani';render()">Biryani</div>
<div class="cat" onclick="cat='drink';render()">Drinks</div>
</div>

<div id="menu"></div>

<div class="cartBtn" onclick="toggleCart()">
Cart (<span id="count">0</span>)
</div>

<div class="cart" id="cart">

<h2>Cart <span style="float:right;cursor:pointer" onclick="toggleCart()">✕</span></h2>

<div id="cartItems"></div>

<div class="total">
Total ₹ <span id="total">0</span>
</div>

<button class="done" onclick="showForm()">Done</button>

<form id="form" style="display:none">

<input id="phone" placeholder="Phone Number">
<input id="pincode" placeholder="Pincode">
<input id="city" placeholder="City">
<input id="district" placeholder="District">
<input id="house" placeholder="House Number">
<input id="area" placeholder="Area">

<button type="button" class="location" onclick="getLocation()">Use My Location</button>

<button type="button" class="order" onclick="order()">Send Order</button>

</form>

</div>

<script>

function img(q){
return "https://source.unsplash.com/400x300/?"+q
}

let cat="all"

const foods=[

{name:"Zinger Burger",price:120,cat:"burger"},
{name:"Cheese Burger",price:130,cat:"burger"},
{name:"Chicken Burger",price:110,cat:"burger"},
{name:"Double Burger",price:150,cat:"burger"},

{name:"Veg Pizza",price:220,cat:"pizza"},
{name:"Chicken Pizza",price:250,cat:"pizza"},
{name:"Paneer Pizza",price:240,cat:"pizza"},

{name:"Chicken Biryani",price:200,cat:"biryani"},
{name:"Mutton Biryani",price:280,cat:"biryani"},
{name:"Veg Biryani",price:160,cat:"biryani"},

{name:"Cold Coffee",price:90,cat:"drink"},
{name:"Chocolate Shake",price:120,cat:"drink"},
{name:"Strawberry Shake",price:120,cat:"drink"}

]

let cart={}

function render(){

let s=document.getElementById("search").value.toLowerCase()

let html=""

foods.forEach((f,i)=>{

if(cat!="all" && f.cat!=cat) return
if(!f.name.toLowerCase().includes(s)) return

html+=`
<div class="food">
<img loading="lazy" src="${img(f.cat)}">
<div class="info">
<div class="name">${f.name}</div>
<div class="rating">★★★★☆</div>
<div class="price">₹${f.price}</div>

<div class="qty">
<button onclick="add(${i})">+</button>
<button onclick="remove(${i})">-</button>
</div>

</div>
</div>
`

})

menu.innerHTML=html

}

function add(i){

cart[i]=(cart[i]||0)+1
updateCart()

}

function remove(i){

if(cart[i]) cart[i]--
updateCart()

}

function updateCart(){

let html=""
let total=0
let count=0

for(let i in cart){

if(cart[i]<=0) continue

let f=foods[i]

html+=`<div class="cart-item">${f.name} x${cart[i]} <span>₹${f.price*cart[i]}</span></div>`

total+=f.price*cart[i]
count+=cart[i]

}

cartItems.innerHTML=html
document.getElementById("total").innerText=total
document.getElementById("count").innerText=count

}

function toggleCart(){

document.getElementById("cart").classList.toggle("active")

}

function showForm(){

document.getElementById("form").style.display="block"

}

let locationLink=""

function getLocation(){

navigator.geolocation.getCurrentPosition(p=>{

locationLink=`https://maps.google.com/?q=${p.coords.latitude},${p.coords.longitude}`
alert("Location Added")

})

}

function order(){

let msg="Order:%0A"

for(let i in cart){

if(cart[i]>0){

let f=foods[i]

msg+=`${f.name} x${cart[i]} ₹${f.price*cart[i]}%0A`

}

}

msg+=`Total ₹${total.innerText}%0A`
msg+=`Phone:${phone.value}%0A`
msg+=`City:${city.value}%0A`
msg+=`Area:${area.value}%0A`
msg+=`Location:${locationLink}`

window.location.href=`sms:8899242083?body=${msg}`

}

render()

</script>

</body>
                                                        </html>
