<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ami Please Restaurant</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root { --primary:#ff4d4d; --secondary:#2d3436; --bg:#fafafa; --radius:12px; --transition:0.3s; }
body { font-family:'Poppins',sans-serif; margin:0; padding:0; background:var(--bg); }
button { cursor:pointer; }

/* Login Page */
#loginPage { position:fixed; top:0; left:0; width:100%; height:100%;
display:flex; align-items:center; justify-content:center; background:#fafafa; z-index:1000;}
.loginBox { background:white; padding:40px; border-radius:var(--radius); width:90%; max-width:400px; text-align:center; box-shadow:0 8px 20px rgba(0,0,0,0.3);}
.loginBox h2 { font-family:'Playfair Display',serif; color:var(--primary); margin-bottom:10px;}
.input-group { margin-bottom:15px; text-align:left;}
.input-group input { width:100%; padding:12px; border-radius:var(--radius); border:1px solid #ddd; outline:none;}

/* Header and Banner */
header { display:flex; justify-content:space-between; align-items:center; padding:15px 20px; background:white; position:sticky; top:0; z-index:10; box-shadow:0 2px 8px rgba(0,0,0,0.1);}
.logo { font-family:'Playfair Display',serif; font-size:22px; color:var(--primary);}
.cart-icon { position:relative; font-size:24px; color:var(--secondary);}
.cart-badge { position:absolute; top:-8px; right:-8px; background:var(--primary); color:white; font-size:12px; width:20px; height:20px; border-radius:50%; display:flex; align-items:center; justify-content:center;}
.banner { background:#ffcccc; height:120px; display:flex; align-items:center; justify-content:center; color:var(--primary); font-family:'Playfair Display',serif; font-size:28px; font-weight:600; margin-bottom:20px;}

/* Foods horizontal */
.container { display:flex; overflow-x:auto; gap:15px; padding:0 15px; scroll-behavior:smooth;}
.food-card { flex:0 0 200px; background:white; padding:10px; border-radius:var(--radius); box-shadow:0 4px 15px rgba(0,0,0,0.08); display:flex; flex-direction:column; align-items:center; text-align:center;}
.food-card img { width:100%; height:120px; object-fit:cover; border-radius:var(--radius);}
.food-actions { display:flex; justify-content:center; align-items:center; margin-top:10px; gap:10px;}
.add-btn, .minus-btn { background:var(--primary); color:white; border:none; border-radius:50%; width:30px; height:30px; cursor:pointer;}
.add-btn:hover, .minus-btn:hover { transform:scale(1.1);}

/* Admin Panel */
#adminPanel { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; z-index:1000;}
.admin-form { background:white; padding:20px; border-radius:var(--radius); width:90%; max-width:400px; display:flex; flex-direction:column; gap:10px; }

/* Cart */
#cartModal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; z-index:1000;}
.cart-panel { background:white; padding:20px; border-radius:var(--radius); width:90%; max-width:400px; display:flex; flex-direction:column; gap:10px;}
.cart-items { max-height:300px; overflow-y:auto;}
.cart-item { display:flex; justify-content:space-between; padding:5px 0;}

/* Order form */
#orderFormOverlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; z-index:1000;}
.order-form { background:white; padding:20px; border-radius:var(--radius); width:90%; max-width:400px; display:flex; flex-direction:column; gap:10px;}

/* Thanks Popup */
#thanksPopup { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--primary); color:white; padding:15px 25px; border-radius:var(--radius); display:none; z-index:1000; font-weight:600;}
#thanksPopup.show { display:block; animation:fadeInOut 2s forwards;}
@keyframes fadeInOut {0%{opacity:0;}10%,90%{opacity:1;}100%{opacity:0;}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginPage">
  <div class="loginBox">
    <h2>Ami Please</h2>
    <div class="input-group"><label>Email</label><input id="email" type="email"></div>
    <div class="input-group"><label>Password</label><input id="password" type="password"></div>
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- MENU -->
<div id="menu" style="display:none;">
  <header>
    <div class="logo"><i class="fas fa-utensils"></i> Ami Please</div>
    <div>
      <span class="cart-icon" onclick="toggleCart()"><i class="fas fa-shopping-cart"></i><span id="cartCount" class="cart-badge">0</span></span>
      <button onclick="logout()" style="margin-left:10px;">Logout</button>
      <button onclick="openAdminPanel()" style="margin-left:10px;">Admin</button>
    </div>
  </header>
  <div class="banner">Delicious Food Delivered</div>
  <div class="container" id="foodList"></div>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel">
  <div class="admin-form">
    <h3 id="adminTitle">Add/Edit Food</h3>
    <input type="text" id="foodName" placeholder="Food Name">
    <input type="number" id="foodPrice" placeholder="Price">
    <input type="number" id="foodRating" placeholder="Rating (1-5)">
    <input type="text" id="foodImage" placeholder="Image URL (optional)">
    <button onclick="submitFood()">Submit</button>
    <button onclick="closeAdminPanel()" style="background:#ccc;">Cancel</button>
  </div>
</div>

<!-- CART -->
<div id="cartModal">
  <div class="cart-panel">
    <h3>Your Cart</h3>
    <span onclick="toggleCart()" style="cursor:pointer;">&times;</span>
    <div id="cartItems" class="cart-items"></div>
    <div>Total: <span id="cartTotal">₹0</span></div>
    <button onclick="placeOrder()">Place Order</button>
  </div>
</div>

<!-- ORDER -->
<div id="orderFormOverlay">
  <div class="order-form">
    <input id="phone" placeholder="Phone">
    <input id="area" placeholder="Area">
    <input id="city" placeholder="City">
    <button onclick="submitOrder()">Submit Order</button>
  </div>
</div>

<div id="thanksPopup">Thanks for visiting Ami Please!</div>

<script>
// Admin + Cart + Foods

let foods = [
  {id:'f1',name:'Burger',price:120,rating:4,img:''},
  {id:'f2',name:'Pizza',price:250,rating:5,img:''},
  {id:'f3',name:'Pasta',price:200,rating:4,img:''},
  {id:'f4',name:'French Fries',price:80,rating:4,img:''},
  {id:'f5',name:'Sandwich',price:100,rating:3,img:''}
];

let cart=[], editingId=null;

function renderFoods(){
  const container = document.getElementById('foodList');
  container.innerHTML='';
  foods.forEach(f=>{
    const div = document.createElement('div'); div.className='food-card';
    div.innerHTML=`
      <img src="${f.img||'https://via.placeholder.com/200x120'}">
      <h3>${f.name}</h3>
      <p>₹${f.price} - ⭐ ${f.rating}</p>
      <div class="food-actions">
        <button onclick="updateCart('${f.id}',-1)">-</button>
        <span id="qty-${f.id}">0</span>
        <button onclick="updateCart('${f.id}',1)">+</button>
      </div>
      <button onclick="editFood('${f.id}')">Edit</button>
      <button onclick="deleteFood('${f.id}')" style="color:red;">Delete</button>
    `;
    container.appendChild(div);
  });
}

function updateCart(id,change){
  let item = cart.find(i=>i.id===id);
  if(item){ item.qty+=change; if(item.qty<0)item.qty=0; }
  else if(change>0) cart.push({id,qty:change});
  document.getElementById(`qty-${id}`).innerText = (cart.find(i=>i.id===id)||{qty:0}).qty;
  updateCartUI();
}

function updateCartUI(){
  const ci=document.getElementById('cartItems'); ci.innerHTML='';
  let total=0;
  cart.forEach(c=>{
    const f=foods.find(ff=>ff.id===c.id);
    if(f){ total+=f.price*c.qty; ci.innerHTML+=`<div>${f.name} x ${c.qty} - ₹${f.price*c.qty}</div>`; }
  });
  document.getElementById('cartTotal').innerText=`₹${total}`;
  document.getElementById('cartCount').innerText=cart.reduce((a,b)=>a+b.qty,0);
}

function toggleCart(){ document.getElementById('cartModal').style.display=
(document.getElementById('cartModal').style.display==='flex')?'none':'flex'; }

function placeOrder(){ 
  if(cart.length===0){ alert('Cart empty'); return; }
  document.getElementById('orderFormOverlay').style.display='flex';
}

function submitOrder(){
  cart=[]; updateCartUI(); document.getElementById('orderFormOverlay').style.display='none';
  const popup = document.getElementById('thanksPopup'); popup.classList.add('show');
  setTimeout(()=>popup.classList.remove('show'),2000);
}

function login(){ document.getElementById('loginPage').style.display='none'; document.getElementById('menu').style.display='block'; renderFoods(); }
function logout(){ document.getElementById('menu').style.display='none'; document.getElementById('loginPage').style.display='flex'; }

function openAdminPanel(){
  editingId=null;
  document.getElementById('foodName').value=''; document.getElementById('foodPrice').value=''; document.getElementById('foodRating').value=''; document.getElementById('foodImage').value='';
  document.getElementById('adminPanel').style.display='flex';
}

function closeAdminPanel(){ document.getElementById('adminPanel').style.display='none'; }

function submitFood(){
  const name=document.getElementById('foodName').value;
  const price=Number(document.getElementById('foodPrice').value);
  const rating=Number(document.getElementById('foodRating').value);
  const img=document.getElementById('foodImage').value;
  if(!name||!price||!rating){ alert('Fill all fields'); return; }
  if(editingId){
    let f = foods.find(f=>f.id===editingId);
    f.name=name; f.price=price; f.rating=rating; f.img=img;
  } else {
    foods.push({id:'f'+(foods.length+1),name,price,rating,img});
  }
  renderFoods(); closeAdminPanel();
}

function editFood(id){
  const f=foods.find(f=>f.id===id); if(!f) return;
  editingId=id; document.getElementById('foodName').value=f.name;
  document.getElementById('foodPrice').value=f.price;
  document.getElementById('foodRating').value=f.rating;
  document.getElementById('foodImage').value=f.img;
  document.getElementById('adminPanel').style.display='flex';
}

function deleteFood(id){ foods=foods.filter(f=>f.id!==id); renderFoods(); }

</script>
</body>
        </html>
