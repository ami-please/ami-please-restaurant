<!-- PART 1: LOGIN + HEADER + BANNER -->  <!DOCTYPE html>  <html lang="en">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  
<title>Ami Please Restaurant</title>  
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">  
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">  
<style>  
:root {--primary:#0077b6;--secondary:#023e8a;--bg:#f0f4f8;--card-bg:#fff;--radius:12px;--transition:0.3s;}  
body{margin:0;padding:0;font-family:'Poppins',sans-serif;background:var(--bg);}  
button{cursor:pointer;}  
/* Login Page */  
#loginPage{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), #023e8a;display:flex;align-items:center;justify-content:center;z-index:1000;}  
.loginBox{background:#fff;padding:40px;border-radius:var(--radius);width:90%;max-width:400px;text-align:center;box-shadow:0 8px 20px rgba(0,0,0,0.3);}  
.loginBox h2{font-family:'Playfair Display',serif;color:var(--primary);margin-bottom:10px;}  
.input-group{margin-bottom:15px;text-align:left;}  
.input-group label{font-weight:500;display:block;margin-bottom:5px;}  
.input-group input{width:100%;padding:12px;border-radius:var(--radius);border:1px solid #ddd;outline:none;}  
/* Header */  
header{display:flex;justify-content:space-between;align-items:center;padding:15px 20px;background:white;position:sticky;top:0;z-index:10;box-shadow:0 2px 8px rgba(0,0,0,0.1);}  
.logo{font-family:'Playfair Display',serif;font-size:22px;color:var(--primary);}  
.cart-icon{position:relative;font-size:24px;color:var(--secondary);}  
.cart-badge{position:absolute;top:-8px;right:-8px;background:var(--primary);color:white;font-size:12px;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;}  
/* Banner */  
.banner{background: var(--primary);height:120px;display:flex;align-items:center;justify-content:center;color:white;font-family:'Playfair Display',serif;font-size:28px;font-weight:600;margin-bottom:20px;border-radius:var(--radius);}  
</style>  
</head>  
<body>  <!-- LOGIN PAGE -->  <div id="loginPage">  
  <div class="loginBox">  
    <h2>Ami Please Login</h2>  
    <div class="input-group">  
      <label>Email</label>  
      <input type="email" id="email" placeholder="Enter email">  
    </div>  
    <div class="input-group">  
      <label>Password</label>  
      <input type="password" id="password" placeholder="Enter password">  
    </div>  
    <button id="loginBtn">Login</button>  
    <button id="signupBtn">Sign Up</button>  
    <p><a href="#" id="forgotLink">Forgot password?</a></p>  
  </div>  
</div>  <!-- MENU -->  <div id="menu" style="display:none;">  
  <header>  
    <div class="logo"><i class="fas fa-utensils"></i> Ami Please</div>  
    <div>  
      <span class="cart-icon" id="cartBtn">  
        <i class="fas fa-shopping-cart"></i>  
        <span id="cartCount" class="cart-badge">0</span>  
      </span>  
      <button id="logoutBtn" style="margin-left:10px;">Logout</button>  
    </div>  
  </header>  
  <div class="banner">Delicious Food Delivered</div>  
  <div class="admin-menu" id="adminMenu">  
    <button id="addFoodBtn">Add Food</button>  
  </div>  
  <div class="container" id="foodList"></div>  
</div><!-- PART 2: ADMIN PANEL, CART MODAL, ORDER FORM -->  
<!-- ADMIN PANEL -->  
<div id="adminPanel">  
  <div class="admin-form">  
    <h3 id="adminFormTitle">Add Food</h3>  
    <input type="text" id="foodName" placeholder="Food Name">  
    <input type="number" id="foodPrice" placeholder="Price">  
    <input type="number" id="foodRating" placeholder="Rating (1-5)">  
    <button id="submitFoodBtn">Submit</button>  
    <button id="closeAdminBtn" style="background:#ccc;color:#000;">Cancel</button>  
  </div>  
</div>  <!-- CART MODAL -->  <div id="cartModal">  
  <div class="cart-panel">  
    <h3>Cart</h3>  
    <div class="cart-items" id="cartItems"></div>  
    <p>Total: <span id="cartTotal">₹0</span></p>  
    <button id="placeOrderBtn">Place Order</button>  
    <button id="closeCart">Close</button>  
  </div>  
</div>  <!-- ORDER FORM OVERLAY -->  <div id="orderFormOverlay">  
  <div class="order-form">  
    <h3>Order Details</h3>  
    <input type="text" id="phone" placeholder="Phone Number">  
    <input type="text" id="pincode" placeholder="Pincode">  
    <input type="text" id="area" placeholder="Area">  
    <input type="text" id="city" placeholder="City">  
    <input type="text" id="locationLink" placeholder="Location Link">  
    <button id="getLocationBtn">Get Current Location</button>  
    <button id="confirmOrderBtn" disabled>Confirm Order</button>  
    <button id="closeOrderForm" onclick="document.getElementById('orderFormOverlay').style.display='none'">Cancel</button>  
  </div>  
</div>  <!-- THANK YOU POPUP -->  <div id="thanksPopup">Thanks for visiting Ami Please!</div><!-- PART 3: FIREBASE CONFIG + AUTH -->  
<script type="module">  
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";  
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";  
import { getFirestore, collection, addDoc, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";  // --- Firebase Configuration ---
const firebaseConfig = {
apiKey: "AIzaSyA1bN6g1EW62p-sDhZh6XsRe78fsJWSe9I",
authDomain: "ami-please-restaurant.firebaseapp.com",
projectId: "ami-please-restaurant",
storageBucket: "ami-please-restaurant.appspot.com",
messagingSenderId: "590274660115",
appId: "1:590274660115:web:998a7c8bb31e4a2696fce6",
measurementId: "G-8FGXXT0Z8L"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const adminEmail = "beejumble43@gmail.com";
let cart = [], foods = [], editingFoodId = null;

// --- LOGIN / SIGNUP / FORGOT ---
document.getElementById('loginBtn').addEventListener('click', ()=>{
const e = document.getElementById('email').value;
const p = document.getElementById('password').value;
if(!e || !p) return alert("Fill all fields");
signInWithEmailAndPassword(auth, e, p).catch(err=>alert(err.message));
});

document.getElementById('signupBtn').addEventListener('click', ()=>{
const e = document.getElementById('email').value;
const p = document.getElementById('password').value;
if(!e || !p) return alert("Fill all fields");
createUserWithEmailAndPassword(auth, e, p).catch(err=>alert(err.message));
});

document.getElementById('forgotLink').addEventListener('click', ()=>{
const e = prompt("Enter your email");
if(e) sendPasswordResetEmail(auth, e).then(()=>alert("Reset email sent")).catch(err=>alert(err.message));
});

document.getElementById('logoutBtn').addEventListener('click', ()=>signOut(auth).catch(err=>alert(err.message)));

// --- AUTH STATE CHANGE ---
onAuthStateChanged(auth, user=>{
if(user){
document.getElementById('loginPage').style.display="none";
document.getElementById('menu').style.display="block";
if(user.email===adminEmail) document.getElementById('adminMenu').style.display="flex";
loadFoods();
} else {
document.getElementById('loginPage').style.display="flex";
document.getElementById('menu').style.display="none";
document.getElementById('adminMenu').style.display="none";
}
});
</script><!-- PART 4: LOAD FOODS + CART + ADMIN -->

<script type="module">  
// --- LOAD FOODS FROM FIRESTORE ---  
async function loadFoods() {  
  foods=[];  
  const snap = await getDocs(collection(db,"foods"));  
  snap.forEach(d=>{  
    const data = d.data();  
    if(!data.deleted) foods.push({id:d.id,...data});  
  });  
  renderFoods();  
}  
  
// --- RENDER FOODS ---  
function renderFoods(){  
  const container = document.getElementById('foodList');  
  container.innerHTML="";  
  foods.forEach(f=>{  
    const div=document.createElement('div');  
    div.className="food-card";  
    div.innerHTML=`  
      <div class="food-info">  
        <h3>${f.name}</h3>  
        <p>₹${f.price} - ⭐ ${f.rating}</p>  
      </div>  
      <div class="food-actions">  
        <button class="minus-btn">-</button>  
        <span id="qty-${f.id}">0</span>  
        <button class="add-btn">+</button>  
      </div>  
      ${auth.currentUser && auth.currentUser.email===adminEmail?  
        `<div style="margin-top:10px;">  
          <button class="edit-btn">Edit</button>  
          <button class="delete-btn">Delete</button>  
        </div>`:""}  
    `;  
    container.appendChild(div);  
    div.querySelector('.add-btn').addEventListener('click', ()=>updateCart(f.id,1));  
    div.querySelector('.minus-btn').addEventListener('click', ()=>updateCart(f.id,-1));  
    const editBtn=div.querySelector('.edit-btn'); if(editBtn) editBtn.addEventListener('click', ()=>editFood(f.id));  
    const delBtn=div.querySelector('.delete-btn'); if(delBtn) delBtn.addEventListener('click', ()=>deleteFood(f.id));  
  });  
}  
  
// --- UPDATE CART ---  
function updateCart(id,change){  
  let item = cart.find(i=>i.id===id);  
  if(item){item.qty+=change; if(item.qty<0)item.qty=0;}  
  else if(change>0) cart.push({id,qty:change});  
  document.getElementById(`qty-${id}`).innerText=(cart.find(i=>i.id===id)||{qty:0}).qty;  
  updateCartUI();  
  if(change>0){const badge=document.getElementById('cartCount'); badge.style.animation='cartAnim 0.5s'; setTimeout(()=>badge.style.animation='none',500);}  
}  
  
// --- UPDATE CART UI ---  
function updateCartUI(){  
  const ci=document.getElementById('cartItems'); ci.innerHTML="";  
  let total=0;  
  cart.forEach(c=>{  
    const f=foods.find(ff=>ff.id===c.id);  
    if(f){total+=f.price*c.qty;  
      const div=document.createElement('div');  
      div.className='cart-item';  
      div.innerHTML=`<span>${f.name} x ${c.qty}</span><span>₹${f.price*c.qty}</span>`;  
      ci.appendChild(div);  
    }  
  });  
  document.getElementById('cartTotal').innerText=`₹${total}`;  
  document.getElementById('cartCount').innerText=cart.reduce((a,b)=>a+b.qty,0);  
}  
  
// --- OPEN/CLOSE CART MODAL ---  
document.getElementById('cartBtn').addEventListener('click', ()=>document.getElementById('cartModal').style.display='flex');  
document.getElementById('closeCart').addEventListener('click', ()=>document.getElementById('cartModal').style.display='none');  
  
// --- ADMIN PANEL OPEN ---  
document.getElementById('addFoodBtn').addEventListener('click', ()=>{  
  editingFoodId=null;  
  document.getElementById('adminFormTitle').innerText='Add Food';  
  document.getElementById('foodName').value='';  
  document.getElementById('foodPrice').value='';  
  document.getElementById('foodRating').value='';  
  document.getElementById('adminPanel').style.display='flex';  
});  
document.getElementById('closeAdminBtn').addEventListener('click', ()=>document.getElementById('adminPanel').style.display='none');  
  
// --- SUBMIT FOOD ---  
document.getElementById('submitFoodBtn').addEventListener('click', async ()=>{  
  const name=document.getElementById('foodName').value;  
  const price=Number(document.getElementById('foodPrice').value);  
  const rating=Number(document.getElementById('foodRating').value);  
  if(!name||!price||!rating){alert("Fill all fields"); return;}  
  if(editingFoodId){  
    const foodRef=doc(db,"foods",editingFoodId);  
    await updateDoc(foodRef,{name,price,rating}); editingFoodId=null;  
  } else { await addDoc(collection(db,"foods"),{name,price,rating}); }  
  document.getElementById('adminPanel').style.display='none';  
  loadFoods();  
});  
  
// --- EDIT/DELETE FOOD ---  
function editFood(id){  
  const f=foods.find(ff=>ff.id===id); if(!f) return;  
  editingFoodId=id;  
  document.getElementById('adminFormTitle').innerText='Edit Food';  
  document.getElementById('foodName').value=f.name;  
  document.getElementById('foodPrice').value=f.price;  
  document.getElementById('foodRating').value=f.rating;  
  document.getElementById('adminPanel').style.display='flex';  
}  
async function deleteFood(id){  
  if(!confirm("Delete this food?")) return;  
  const foodRef=doc(db,"foods",id); await updateDoc(foodRef,{deleted:true});  
  loadFoods();  
}  
</script><!-- PART 5: ORDER FORM + CONFIRM ORDER + THANKS POPUP -->  <script type="module">  
// --- PLACE ORDER BUTTON ---  
document.getElementById('placeOrderBtn').addEventListener('click', ()=>{  
  if(cart.length===0){alert("Cart is empty"); return;}  
  document.getElementById('orderFormOverlay').style.display='flex';  
});  
  
// --- CHECK ORDER FORM INPUTS ---  
function checkOrderForm(){  
  const phone=document.getElementById('phone').value;  
  const pincode=document.getElementById('pincode').value;  
  const area=document.getElementById('area').value;  
  const city=document.getElementById('city').value;  
  const loc=document.getElementById('locationLink').value;  
  document.getElementById('confirmOrderBtn').disabled=!(phone&&pincode&&area&&city&&loc);  
}  
['phone','pincode','area','city','locationLink'].forEach(id=>document.getElementById(id).addEventListener('input', checkOrderForm));  
  
// --- GET CURRENT LOCATION ---  
document.getElementById('getLocationBtn').addEventListener('click', ()=>{  
  if(navigator.geolocation){  
    navigator.geolocation.getCurrentPosition(pos=>{  
      const lat=pos.coords.latitude;  
      const lng=pos.coords.longitude;  
      document.getElementById('locationLink').value=`https://www.google.com/maps?q=${lat},${lng}`;  
      checkOrderForm();  
    }, ()=>alert("Unable to fetch location"));  
  } else alert("Geolocation not supported");  
});  
  
// --- CONFIRM ORDER ---  
document.getElementById('confirmOrderBtn').addEventListener('click', async ()=>{  
  const phone=document.getElementById('phone').value;  
  const pincode=document.getElementById('pincode').value;  
  const area=document.getElementById('area').value;  
  const city=document.getElementById('city').value;  
  const loc=document.getElementById('locationLink').value;  
  if(!phone||!pincode||!area||!city||!loc){alert("Fill all fields"); return;}  
  
  try{  
    await addDoc(collection(db,"orders"),{  
      user:auth.currentUser.email,  
      cart:cart,  
      phone, pincode, area, city, locationLink:loc,  
      timestamp:Date.now()  
    });  
    cart=[]; updateCartUI();  
    document.getElementById('orderFormOverlay').style.display='none';  
    document.getElementById('cartModal').style.display='none';  
    ['phone','pincode','area','city','locationLink'].forEach(id=>document.getElementById(id).value="");  
  
    // Show popup  
    const popup=document.getElementById('thanksPopup');  
    popup.classList.add('show'); setTimeout(()=>popup.classList.remove('show'),2000);  
  } catch(err){alert("Error placing order: "+err.message);}  
});  
</script>  </body>  
  </html>
