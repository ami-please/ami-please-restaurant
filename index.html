<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Ami Please Restaurant</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>

body{font-family:Poppins;margin:0;background:#f5f5f5}

/* LOGIN */

#loginPage{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),
url("https://images.unsplash.com/photo-1504674900247-0877df9cc836") center/cover
}

.loginBox{
background:white;
padding:40px;
border-radius:10px;
width:300px;
text-align:center
}

.loginBox input{width:100%;padding:10px;margin:6px 0}
.loginBox button{width:100%;padding:10px;margin:4px 0;background:#ff4d4d;color:white;border:none}

/* SITE */

#site{display:none}

header{
display:flex;
justify-content:space-between;
background:white;
padding:10px
}

#searchFood{padding:8px;width:200px}

/* CATEGORIES */

.categories{
padding:10px;
display:flex;
gap:10px;
overflow:auto
}

.categories button{padding:6px 12px}

/* MENU */

#menu{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
padding:10px
}

.foodCard{
background:white;
border-radius:10px;
padding:10px
}

.foodCard img{
width:100%;
height:120px;
object-fit:cover
}

/* CART */

#cart{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
padding:10px;
display:none
}

/* ADMIN */

#adminPanel{
background:#222;
color:white;
padding:15px;
margin:10px;
border-radius:10px;
display:none
}

</style>

</head>

<body>

<!-- LOGIN -->

<div id="loginPage">

<div class="loginBox">

<h1 style="font-family:Playfair Display">Ami Please</h1>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>
<button onclick="signup()">Signup</button>
<button onclick="resetPass()">Forgot Password</button>

</div>
</div>


<!-- WEBSITE -->

<div id="site">

<header>

<h2 style="font-family:Playfair Display">Ami Please</h2>

<input id="searchFood" placeholder="Search food">

<button onclick="logout()">Logout</button>

</header>


<div class="categories">

<button onclick="filterCat('all')">All</button>
<button onclick="filterCat('burger')">Burger</button>
<button onclick="filterCat('pizza')">Pizza</button>
<button onclick="filterCat('rice')">Rice</button>
<button onclick="filterCat('drinks')">Drinks</button>

</div>


<div id="menu"></div>


<div id="cart">

<span id="cartCount">0</span> items

<button onclick="placeOrder()">Order</button>

</div>


<div id="adminPanel">

<h3>Admin Food Control</h3>

<input id="foodName" placeholder="Food name">
<input id="foodPrice" placeholder="Price">
<input id="foodRating" placeholder="Rating">

<input type="file" id="foodImage">

<button onclick="uploadFood()">Save Food</button>

<h3>Orders</h3>

<div id="orders"></div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js"

import { getAuth,signInWithEmailAndPassword,createUserWithEmailAndPassword,sendPasswordResetEmail,onAuthStateChanged,signOut }

from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js"

import { getFirestore,collection,addDoc,getDocs,doc,setDoc,getDoc,deleteDoc,updateDoc }

from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js"

import { getStorage,ref,uploadBytes,getDownloadURL }

from "https://www.gstatic.com/firebasejs/12.10.0/firebase-storage.js"


const firebaseConfig={

apiKey:"AIzaSyA1bN6g1EW62p-sDhZh6XsRe78fsJWSe9I",
authDomain:"ami-please-restaurant.firebaseapp.com",
projectId:"ami-please-restaurant",
storageBucket:"ami-please-restaurant.appspot.com",
messagingSenderId:"590274660115",
appId:"1:590274660115:web:998a7c8bb31e4a2696fce6"

}


const app=initializeApp(firebaseConfig)

const auth=getAuth(app)
const db=getFirestore(app)
const storage=getStorage(app)

const adminEmail="beejumble43@gmail.com"


let cart=[]


const foods=[

{n:"Veg Burger",c:"burger"},
{n:"Chicken Burger",c:"burger"},
{n:"Cheese Burger",c:"burger"},
{n:"Veg Pizza",c:"pizza"},
{n:"Chicken Pizza",c:"pizza"},
{n:"Paneer Pizza",c:"pizza"},
{n:"BBQ Pizza",c:"pizza"},
{n:"Veg Fried Rice",c:"rice"},
{n:"Chicken Fried Rice",c:"rice"},
{n:"Egg Fried Rice",c:"rice"},
{n:"Chicken Biryani",c:"rice"},
{n:"Mutton Biryani",c:"rice"},
{n:"Veg Chowmein",c:"noodles"},
{n:"Chicken Chowmein",c:"noodles"},
{n:"Egg Chowmein",c:"noodles"},
{n:"Veg Roll",c:"roll"},
{n:"Chicken Roll",c:"roll"},
{n:"Paneer Roll",c:"roll"},
{n:"French Fries",c:"snacks"},
{n:"Cheese Fries",c:"snacks"},
{n:"Peri Peri Fries",c:"snacks"},
{n:"Coffee",c:"drinks"},
{n:"Cold Coffee",c:"drinks"},
{n:"Cappuccino",c:"drinks"},
{n:"Latte",c:"drinks"},
{n:"Mocha",c:"drinks"},
{n:"Mojito",c:"drinks"},
{n:"Lemon Soda",c:"drinks"}

]


window.login=()=>{

signInWithEmailAndPassword(auth,email.value,password.value)

}

window.signup=()=>{

createUserWithEmailAndPassword(auth,email.value,password.value)

}

window.resetPass=()=>{

sendPasswordResetEmail(auth,email.value)

}

window.logout=()=>{

signOut(auth).then(()=>location.reload())

}


onAuthStateChanged(auth,user=>{

if(user){

loginPage.style.display="none"
site.style.display="block"

if(user.email===adminEmail){

adminPanel.style.display="block"
loadOrders()

}

loadMenu()

}

})


async function loadMenu(){

menu.innerHTML=""

for(const food of foods){

let price=""
let rating=""
let image=""

const snap=await getDoc(doc(db,"foods",food.n))

if(snap.exists()){

const d=snap.data()

price=d.price
rating=d.rating
image=d.image

}

menu.innerHTML+=`

<div class="foodCard" data-category="${food.c}">

<img src="${image || 'https://via.placeholder.com/300x150'}">

<h3>${food.n}</h3>

₹ ${price || "-"}

<br>

${"⭐".repeat(rating || 0)}

<br>

<button onclick="addCart('${food.n}')">Add</button>

</div>

`

}

}


window.addCart=(name)=>{

cart.push(name)

cart.style.display="block"

cartCount.innerText=cart.length

}


window.placeOrder=async()=>{

await addDoc(collection(db,"orders"),{

email:auth.currentUser.email,
items:cart,
status:"Pending",
time:new Date().toLocaleString()

})

alert("Thanks for visiting Ami Please")

cart=[]

}


window.uploadFood=async()=>{

const file=foodImage.files[0]

const storageRef=ref(storage,"foods/"+foodName.value)

await uploadBytes(storageRef,file)

const url=await getDownloadURL(storageRef)

await setDoc(doc(db,"foods",foodName.value),{

price:foodPrice.value,
rating:foodRating.value,
image:url

})

loadMenu()

}


async function loadOrders(){

orders.innerHTML=""

const q=await getDocs(collection(db,"orders"))

q.forEach(d=>{

const o=d.data()

orders.innerHTML+=`

<div style="background:#444;padding:10px;margin:6px">

${o.email}

<br>

${o.items}

<br>

Status: ${o.status}

<br>

<button onclick="updateStatus('${d.id}','Preparing')">Preparing</button>

<button onclick="updateStatus('${d.id}','Delivered')">Delivered</button>

</div>

`

})

}


window.updateStatus=async(id,status)=>{

await updateDoc(doc(db,"orders",id),{

status:status

})

loadOrders()

}


searchFood.oninput=()=>{

const text=searchFood.value.toLowerCase()

document.querySelectorAll(".foodCard").forEach(card=>{

const name=card.innerText.toLowerCase()

card.style.display=name.includes(text)?"block":"none"

})

}


window.filterCat=(cat)=>{

document.querySelectorAll(".foodCard").forEach(card=>{

if(cat==="all"){card.style.display="block";return}

card.style.display=
card.dataset.category===cat?"block":"none"

})

}


Notification.requestPermission()

</script>

</body>
  </html>
